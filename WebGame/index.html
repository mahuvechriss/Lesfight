<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LES FIGHT - Web Edition</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; touch-action: none; -webkit-user-select: none; user-select: none; }

/* Force landscape on mobile */
@media (orientation: portrait) {
  #rotateHint { display: flex !important; }
  #gameContainer { display: none !important; }
}
#rotateHint {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #000; color: #fff; display: none;
  flex-direction: column; align-items: center; justify-content: center; z-index: 999;
  font-size: 24px; text-align: center; padding: 20px;
}
#rotateHint .icon { font-size: 60px; margin-bottom: 20px; animation: rotate 2s infinite; }
@keyframes rotate { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(90deg)} }

#gameContainer { width: 100%; height: 100%; position: relative; overflow: hidden; }
canvas { display: block; width: 100%; height: 100%; }

/* Menu */
#menuScreen {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(180deg, #0d0d1a 0%, #1a0a0a 40%, #0d0d1a 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
    transition: opacity 0.6s;
}
#menuScreen.hidden { opacity: 0; pointer-events: none; }
.menu-title {
    font-size: clamp(36px, 6vw, 72px); font-weight: 900; letter-spacing: 6px;
    background: linear-gradient(135deg, #ff2200, #ff6600, #ffcc00, #ff6600, #ff2200);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 2px; line-height: 1;
}
.menu-sub { color: rgba(255,255,255,0.3); font-size: clamp(9px, 1.2vw, 14px); letter-spacing: 10px; margin-bottom: 20px; }
.menu-row { display: flex; flex-direction: column; align-items: center; margin: 4px 0; gap: 3px; }
.menu-row label { color: #888; font-size: clamp(9px, 1vw, 12px); letter-spacing: 2px; text-transform: uppercase; }
.menu-row select { padding: 6px 14px; font-size: clamp(12px, 1.2vw, 15px); background: #1a1a2e; color: #fff; border: 1px solid #ff444488; border-radius: 8px; text-align: center; min-width: 120px; }
.play-btn { padding: 14px 50px; margin-top: 14px; font-size: clamp(16px, 2vw, 24px); font-weight: 900; border: none; background: linear-gradient(135deg, #ff4400, #ff6600); color: #fff; border-radius: 50px; cursor: pointer; letter-spacing: 3px; box-shadow: 0 4px 30px rgba(255,68,0,0.4); }
.play-btn:active { transform: scale(0.95); }

/* Settings gear */
#settingsBtn {
    position: absolute; top: 12px; right: 16px; z-index: 101;
    font-size: clamp(22px, 3vw, 30px); cursor: pointer; opacity: 0.4;
    transition: opacity 0.3s; padding: 8px;
}
#settingsBtn:hover, #settingsBtn:active { opacity: 0.9; }

/* Settings screen */
#settingsScreen {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(5, 2, 12, 0.96); z-index: 200;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none; transition: opacity 0.4s;
    overflow: hidden;
}
#settingsScreen.show { opacity: 1; pointer-events: all; }
#settingsHeader {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px; flex-shrink: 0;
}
#settingsTitle { font-size: clamp(16px, 2vw, 22px); font-weight: 900; color: #fff; letter-spacing: 2px; }
#settingsClose { font-size: clamp(20px, 2.5vw, 28px); color: #ff4444; cursor: pointer; padding: 6px 10px; }
#settingsContent {
    flex: 1; position: relative; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.05); margin: 4px 10px;
    border-radius: 12px; background: rgba(0,0,0,0.3);
}
#settingsHint {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.2); font-size: clamp(10px, 1vw, 13px);
    text-align: center; letter-spacing: 1px; pointer-events: none;
    z-index: 10; white-space: nowrap;
}
#settingsFooter {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; padding: 10px 18px; flex-shrink: 0;
    flex-wrap: wrap;
}
.settings-btn {
    padding: 8px 22px; font-size: clamp(11px, 1.2vw, 14px); font-weight: bold;
    border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
    color: #fff; border-radius: 20px; cursor: pointer; letter-spacing: 1px;
}
.settings-btn:active { transform: scale(0.95); }
.settings-btn.reset { border-color: #ff444466; color: #ff6666; }
.settings-btn.save { border-color: #44ff8866; color: #66ff88; background: rgba(68,255,136,0.1); }
.settings-btn.add { border-color: #4488ff66; color: #6688ff; }

/* Settings draggable button */
.setting-btn {
    position: absolute; z-index: 20;
    border-radius: 50%; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #fff; cursor: grab; touch-action: none;
    border: 2px solid rgba(255,255,255,0.12);
    transition: border-color 0.2s, box-shadow 0.2s;
    background: rgba(255,255,255,0.04);
}
.setting-btn.dragging { border-color: #ff6600; box-shadow: 0 0 30px rgba(255,102,0,0.3); z-index: 50; cursor: grabbing; }
.setting-btn .del-btn {
    position: absolute; top: -8px; right: -8px; width: 22px; height: 22px;
    border-radius: 50%; background: #ff3333; border: none; color: #fff;
    font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    opacity: 0.8; z-index: 25;
}
.setting-btn .del-btn:active { opacity: 1; transform: scale(1.2); }
.setting-btn .size-ctrl {
    position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%);
    width: 80px; display: flex; align-items: center; gap: 4px;
    opacity: 0.6; pointer-events: auto;
}
.setting-btn .size-ctrl input[type=range] {
    width: 100%; height: 3px; -webkit-appearance: none; appearance: none;
    background: rgba(255,255,255,0.2); border-radius: 2px; outline: none;
}
.setting-btn .size-ctrl input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
    background: #ff6600; cursor: pointer;
}
.setting-btn .size-num {
    font-size: 8px; color: rgba(255,255,255,0.5); min-width: 18px; text-align: center;
}

/* Deleted buttons tray */
#deletedTray {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 6px; background: rgba(255,68,68,0.06); border-top: 1px solid rgba(255,68,68,0.1);
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center; justify-content: center;
    min-height: 40px;
}
#deletedTray .tray-label { font-size: 9px; color: rgba(255,255,255,0.2); letter-spacing: 1px; margin-right: 4px; }
#deletedTray .del-item {
    width: 40px; height: 40px; border-radius: 50%; border: 1px dashed rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer; opacity: 0.5;
    background: rgba(255,255,255,0.03);
}
#deletedTray .del-item:active { opacity: 1; background: rgba(255,255,255,0.1); }

/* Result */
#resultScreen {
    position: absolute; top:0;left:0;width:100%;height:100%;
    background: rgba(0,0,0,0.88); display:flex;flex-direction:column;
    align-items:center;justify-content:center;z-index:50;
    opacity:0;pointer-events:none;transition:opacity 0.5s;
}
#resultScreen.show{opacity:1;pointer-events:all;}
.res-win{font-size:clamp(32px,5vw,56px);font-weight:900;margin-bottom:4px;}
.res-win.win{color:#ffcc00;text-shadow:0 0 40px rgba(255,204,0,0.3);}
.res-win.lose{color:#ff4444;}
.res-sub{color:#aaa;font-size:clamp(12px,1.4vw,18px);margin-bottom:20px;}
.res-btn{padding:10px 36px;margin:4px;font-size:clamp(13px,1.4vw,17px);font-weight:bold;border:2px solid #ff4444;background:transparent;color:#fff;border-radius:50px;cursor:pointer;letter-spacing:2px;min-width:140px;}
.res-btn:active{background:#ff4444;color:#000;transform:scale(0.95);}

/* Round announce */
#roundAnnounce{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:40;opacity:0;pointer-events:none;}
#roundAnnounce.show{opacity:1;}
.round-text{font-size:clamp(44px,10vw,100px);font-weight:900;color:#fff;-webkit-text-stroke:3px #ff4444;text-stroke:3px #ff4444;text-shadow:0 0 60px rgba(255,68,68,0.4);}

/* Character select */
#charSelectScreen{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#0d0d1a 0%,#1a0a0a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:60;opacity:0;pointer-events:none;transition:opacity 0.5s;}
#charSelectScreen.show{opacity:1;pointer-events:all;}
.char-title{font-size:clamp(18px,2.5vw,30px);font-weight:900;color:#fff;margin-bottom:14px;letter-spacing:3px;}
.char-grid{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:500px;}
.char-card{width:clamp(80px,14vw,130px);height:clamp(110px,18vw,170px);border:2px solid #333;border-radius:10px;background:#111122;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;padding:8px;}
.char-card.selected{border-color:#ff6600;box-shadow:0 0 25px rgba(255,102,0,0.3);}
.char-card:active{transform:scale(0.95);}
.char-avatar{font-size:clamp(32px,5vw,56px);margin-bottom:6px;}
.char-name{color:#fff;font-size:clamp(10px,1vw,13px);font-weight:bold;letter-spacing:1px;}
.char-desc{color:#888;font-size:clamp(7px,0.8vw,10px);margin-top:2px;}
.char-select-btn{margin-top:14px;padding:10px 40px;font-size:clamp(14px,1.8vw,20px);font-weight:900;border:none;background:linear-gradient(135deg,#ff4400,#ff6600);color:#fff;border-radius:50px;cursor:pointer;letter-spacing:2px;box-shadow:0 4px 30px rgba(255,68,0,0.3);}
.char-select-btn:active{transform:scale(0.95);}

/* Joystick zone */
#joystickZone {
    position: absolute; bottom: 10%; left: 3%; width: 130px; height: 130px; z-index: 10;
    border-radius: 50%; background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
}
#joystickKnob {
    width: 50px; height: 50px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
    border: 1px solid rgba(255,255,255,0.2);
    position: absolute; transition: none;
    pointer-events: none;
}
#joystickLabel {
    position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%);
    font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 2px;
    white-space: nowrap; pointer-events: none;
}

/* Action buttons */
.ctrl-btn {
    position: absolute; z-index: 10;
    border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #fff; font-size: 18px;
    transition: transform 0.1s, background 0.1s;
    backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
    pointer-events: auto;
}
.ctrl-btn .lbl { font-size: 7px; opacity: 0.7; display: block; margin-top: -1px; }
#btnBlock {
    position: absolute; z-index: 10;
    border-radius: 12px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: transform 0.1s, background 0.1s;
    backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
}
</style>
</head>
<body>
<div id="rotateHint">
    <div class="icon">📱</div>
    <div>Please rotate your phone to <b>landscape mode</b></div>
    <div style="font-size:16px;color:#888;margin-top:10px">↻ Turn your phone sideways</div>
</div>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>

    <div id="menuScreen">
        <div class="menu-title">LES FIGHT</div>
        <div class="menu-sub">WEB EDITION</div>
        <div class="menu-row">
            <label>Difficulty</label>
            <select id="diffSelect">
                <option value="easy">🐣 Easy</option>
                <option value="normal" selected>🥊 Normal</option>
                <option value="hard">🔥 Hard</option>
                <option value="expert">💀 Expert</option>
            </select>
        </div>
        <div class="menu-row">
            <label>Match</label>
            <select id="roundsSelect">
                <option value="1">1 Round</option>
                <option value="2" selected>Best of 3</option>
                <option value="3">Best of 5</option>
            </select>
        </div>
        <button class="play-btn" id="startBtn">⚔️ FIGHT</button>
        <div id="settingsBtn">⚙️</div>
    </div>

    <div id="settingsScreen">
        <div id="settingsHeader">
            <div id="settingsTitle">🎮 CUSTOMIZE CONTROLS</div>
            <div id="settingsClose">✕</div>
        </div>
        <div id="settingsContent">
            <div id="settingsHint">↕ Drag to move &nbsp;·&nbsp; ✕ to remove &nbsp;·&nbsp; Slider for size</div>
            <div id="deletedTray"></div>
        </div>
        <div id="settingsFooter">
            <button class="settings-btn add" id="settingsAddBtn">+ Add buttons</button>
            <button class="settings-btn reset" id="settingsResetBtn">↺ Reset</button>
            <button class="settings-btn save" id="settingsSaveBtn">✓ Done</button>
        </div>
    </div>

    <div id="charSelectScreen">
        <div class="char-title">SELECT YOUR FIGHTER</div>
        <div class="char-grid" id="charGrid"></div>
        <button class="char-select-btn" id="charConfirmBtn">✅ FIGHT!</button>
    </div>

    <div id="resultScreen">
        <div class="res-win" id="resText">YOU WIN!</div>
        <div class="res-sub" id="resSub">Perfect Victory!</div>
        <button class="res-btn" id="rematchBtn">🔄 Rematch</button>
        <button class="res-btn" id="menuBtn" style="margin-top:2px">🏠 Menu</button>
    </div>

    <div id="roundAnnounce"><div class="round-text" id="roundAnnounceText">ROUND 1</div></div>
</div>

<script>
// ============================================================
// LES FIGHT - Web Edition v4 - Customizable Controls!
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

// Audio
let actx = null;
function initAudio() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); }
function playHit(p=1) { if(!actx)return; try{const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type='sawtooth';o.frequency.setValueAtTime(180*p,actx.currentTime);o.frequency.exponentialRampToValueAtTime(40,actx.currentTime+0.12);g.gain.setValueAtTime(0.3,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.15);o.start();o.stop(actx.currentTime+0.15)}catch(e){} }
function playBlock() { if(!actx)return; try{const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type='square';o.frequency.setValueAtTime(400,actx.currentTime);o.frequency.exponentialRampToValueAtTime(80,actx.currentTime+0.05);g.gain.setValueAtTime(0.12,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.08);o.start();o.stop(actx.currentTime+0.08)}catch(e){} }
function playKO() { if(!actx)return; try{const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type='sawtooth';o.frequency.setValueAtTime(250,actx.currentTime);o.frequency.exponentialRampToValueAtTime(15,actx.currentTime+0.6);g.gain.setValueAtTime(0.35,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.7);o.start();o.stop(actx.currentTime+0.7)}catch(e){} }
function playSpecial() { if(!actx)return; try{const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type='sine';o.frequency.setValueAtTime(600,actx.currentTime);o.frequency.exponentialRampToValueAtTime(1500,actx.currentTime+0.15);o.frequency.exponentialRampToValueAtTime(300,actx.currentTime+0.35);g.gain.setValueAtTime(0.25,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.4);o.start();o.stop(actx.currentTime+0.4)}catch(e){} }
function playUltimate() { if(!actx)return; try{const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type='sawtooth';o.frequency.setValueAtTime(80,actx.currentTime);o.frequency.exponentialRampToValueAtTime(2000,actx.currentTime+0.5);o.frequency.exponentialRampToValueAtTime(30,actx.currentTime+0.9);g.gain.setValueAtTime(0.35,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+1);o.start();o.stop(actx.currentTime+1)}catch(e){} }

// Constants
const MAX_HP = 1000, MAX_SUPER = 100, GRAVITY = 0.55;
const GROUND_RATIO = 0.74;

// Characters
const CHARACTERS = [
    { id:'dragon', name:'DRAGON FIST', emoji:'🐉', desc:'Powerful striker', color:'#ff4422', dark:'#cc2211', style:'karate' },
    { id:'shadow', name:'SHADOW BLADE', emoji:'🗡️', desc:'Fast ninja', color:'#8844ff', dark:'#6622cc', style:'ninja' },
    { id:'titan', name:'TITAN', emoji:'🦍', desc:'Heavy hitter', color:'#44aaff', dark:'#2288cc', style:'boxing' },
    { id:'phoenix', name:'PHOENIX', emoji:'🔥', desc:'Agile kicker', color:'#ff6644', dark:'#cc4422', style:'kickboxing' },
    { id:'cyber', name:'CYBER', emoji:'🤖', desc:'Tech fighter', color:'#44ff88', dark:'#22cc66', style:'cyber' },
    { id:'oni', name:'ONI', emoji:'👹', desc:'Demon warrior', color:'#cc2244', dark:'#991133', style:'demon' },
];

let gameState = 'menu', difficulty = 'normal', roundsToWin = 2;
let currentRound = 1, p1Rounds = 0, p2Rounds = 0;
let frameCount = 0, timeLeft = 99;
let announceText = '', announceTimer = 0;
let screenShake = 0;
let particles = [], floatTexts = [];
let playerChar = 0, enemyChar = 1;

// Virtual Joystick state
const JOYSTICK = { active: false, touchId: -1, dx: 0, dy: 0, baseX: 0, baseY: 0 };
const JSTICK_RADIUS = 55;

// ===== CUSTOM BUTTON LAYOUT SYSTEM =====
const BUTTON_DEFS = [
    { id:'btnLP', text:'👊', label:'LP', default:{x:72,y:45,sz:50}, bg:'rgba(255,255,255,0.08)', bd:'rgba(255,255,255,0.15)' },
    { id:'btnHP', text:'💥', label:'HP', default:{x:78,y:36,sz:54}, bg:'rgba(255,200,0,0.1)', bd:'rgba(255,200,0,0.2)' },
    { id:'btnLK', text:'🦵', label:'LK', default:{x:84,y:45,sz:50}, bg:'rgba(255,255,255,0.08)', bd:'rgba(255,255,255,0.15)' },
    { id:'btnHK', text:'🦶', label:'HK', default:{x:78,y:54,sz:54}, bg:'rgba(255,200,0,0.1)', bd:'rgba(255,200,0,0.2)' },
    { id:'btnSP', text:'⚡', label:'SP', default:{x:91,y:38,sz:52}, bg:'rgba(255,200,0,0.12)', bd:'rgba(255,200,0,0.3)' },
    { id:'btnULT', text:'🌟', label:'ULT', default:{x:91,y:52,sz:52}, bg:'rgba(255,68,68,0.12)', bd:'rgba(255,68,68,0.3)' },
    { id:'btnBlock', text:'🛡️', label:'BLOCK', default:{x:10,y:28,sz:60}, bg:'rgba(68,136,255,0.1)', bd:'rgba(68,136,255,0.25)' },
];

function getDefaultLayout() {
    const l = {};
    BUTTON_DEFS.forEach(b => { l[b.id] = { x:b.default.x, y:b.default.y, sz:b.default.sz, enabled:true }; });
    return l;
}

let buttonLayout = null;
function loadButtonLayout() {
    try {
        const saved = localStorage.getItem('lesfight_btns');
        if (saved) {
            const parsed = JSON.parse(saved);
            // Merge with defaults to handle any new buttons
            const def = getDefaultLayout();
            Object.keys(def).forEach(k => {
                if (!parsed[k]) parsed[k] = def[k];
                else { if (parsed[k].x===undefined) parsed[k].x=def[k].x; if (parsed[k].y===undefined) parsed[k].y=def[k].y; if (parsed[k].sz===undefined) parsed[k].sz=def[k].sz; if (parsed[k].enabled===undefined) parsed[k].enabled=true; }
            });
            buttonLayout = parsed;
            return parsed;
        }
    } catch(e) {}
    buttonLayout = getDefaultLayout();
    return getDefaultLayout();
}
function saveButtonLayout(layout) {
    buttonLayout = layout;
    try { localStorage.setItem('lesfight_btns', JSON.stringify(layout)); } catch(e) {}
}
function resetButtonLayout() {
    const def = getDefaultLayout();
    saveButtonLayout(def);
    return def;
}
loadButtonLayout();

// ===== FIGHTER CLASS =====
class Fighter {
    constructor(x, z, isPlayer, charIdx) {
        this.x = x; this.z = z || 0; this.y = 0;
        this.vx = 0; this.vy = 0; this.vz = 0;
        this.w = 64; this.h = 130;
        this.isPlayer = isPlayer;
        this.charIdx = charIdx || 0;
        const c = CHARACTERS[this.charIdx];
        this.color = c.color; this.dark = c.dark;
        this.name = c.name; this.style = c.style;
        this.facingRight = isPlayer;
        this.health = MAX_HP; this.maxHealth = MAX_HP;
        this.superMeter = 0; this.maxSuper = MAX_SUPER;
        this.stamina = 100;
        this.grounded = false;
        this.state = 'idle'; this.stateTimer = 0;
        this.attackCooldown = 0; this.blockPressed = false;
        this.hitCount = 0; this.invulnerable = false; this.invulnTimer = 0;
        this.attackType = ''; this.attackHit = false;
        this.animTime = 0; this.floatY = 0;
        this.wins = 0; this.comboActive = 0;
        this.yOffset = 0;
    }
    get groundY() { return canvas.height * GROUND_RATIO + this.z * 15; }
    get hitbox() {
        const hw = this.w*0.35, hh = this.h*0.4;
        let ox = 0; if(this.state==='blocking') ox = this.facingRight?-10:10;
        return {x:this.x+ox-hw, y:this.y-hh, w:hw*2, h:hh*2};
    }
    get atkBox() {
        const reach = 55+this.w*0.25;
        const cx = this.facingRight ? this.x+this.w*0.3 : this.x-this.w*0.3;
        return {x:cx-reach/2, y:this.y-this.h*0.4, w:reach, h:this.h*0.5};
    }
    takeDamage(amount, kb=5) {
        if(this.invulnerable) return false;
        if(this.state==='blocking') {
            amount*=0.12; playBlock();
            this.vx = this.facingRight?kb*0.4:-kb*0.4;
            this.hitCount = 0; this.addSuper(2);
            addFloat(this.x, this.y-60, 'BLOCK!', '#44aaff', 0.7);
            return amount>0;
        }
        this.state='hit'; this.stateTimer=14;
        this.health = Math.max(0, this.health-amount);
        this.vx = this.facingRight?kb:-kb;
        this.vy = -3-Math.random()*3;
        this.hitCount++; this.comboActive = this.hitCount;
        this.addSuper(amount*0.07);
        screenShake = Math.min(18, amount*0.07+3);
        playHit(0.8+amount*0.003);
        if(this.hitCount>2) addFloat(this.x, this.y-80, this.hitCount+' HIT!', '#ff8800', 0.8);
        addParticles(this.x, this.y-50, 8+amount*0.04, '#ffff44', 5);
        addFloat(this.x+(Math.random()-0.5)*20, this.y-60-Math.random()*20, '-'+Math.round(amount), amount>150?'#ff4400':amount>80?'#ffaa00':'#fff', 0.7);
        if(this.health<=0) { this.state='knocked'; this.stateTimer=90; this.vy=-10; this.vx=this.facingRight?18:-18; playKO(); }
        return true;
    }
    addSuper(a) { this.superMeter = Math.min(this.maxSuper, this.superMeter+a); }
    getDmg() {
        switch(this.attackType) {
            case'light': return {d:30+Math.random()*10,k:4,s:5};
            case'heavy': return {d:65+Math.random()*15,k:10,s:9};
            case'kick': return {d:45+Math.random()*12,k:6,s:7};
            case'special': return {d:130+Math.random()*20,k:16,s:0};
            case'ultimate': return {d:220+Math.random()*30,k:22,s:0};
            default: return {d:25,k:3,s:3};
        }
    }
    attack(type) {
        if(this.attackCooldown>0||this.state==='hit'||this.state==='knocked') return;
        if(type==='special'&&this.superMeter<30){addFloat(this.x,this.y-50,'NOT ENOUGH!','#ff4444',0.6);return;}
        if(type==='ultimate'&&this.superMeter<100){addFloat(this.x,this.y-50,'NOT ENOUGH!','#ff4444',0.6);return;}
        this.state='attacking'; this.stateTimer=18; this.attackType=type; this.attackHit=false;
        this.attackCooldown = type==='light'?10:type==='heavy'?20:type==='kick'?14:type==='special'?28:38;
        if(type==='special'){this.superMeter-=30;playSpecial();}
        if(type==='ultimate'){this.superMeter-=100;playUltimate();}
    }
    update(dt, opp) {
        this.stateTimer--; if(this.attackCooldown>0) this.attackCooldown--;
        this.vy+=GRAVITY; this.x+=this.vx; this.y+=this.vy; this.z+=this.vz;
        this.vx*=0.88; this.vz*=0.88;
        const gy = canvas.height * GROUND_RATIO + this.z * 12;
        if(this.y>=gy){this.y=gy;this.vy=0;this.grounded=true;}
        this.x = Math.max(30, Math.min(canvas.width-30, this.x));
        this.z = Math.max(-3, Math.min(3, this.z));
        if(this.invulnerable){this.invulnTimer--;if(this.invulnTimer<=0)this.invulnerable=false;}
        if(this.state==='hit'&&this.stateTimer<=0){this.state='idle';this.attackCooldown=0;this.hitCount=0;}
        if(this.state==='knocked'&&this.stateTimer<=0){this.state='idle';this.hitCount=0;}
        if(this.state==='attacking'&&this.stateTimer<=0)this.state='idle';
        this.animTime+=dt*3;
        if(this.state==='idle')this.floatY=Math.sin(this.animTime)*3;
        else if(this.state==='hit')this.floatY=Math.sin(Date.now()*0.06)*5;
        else this.floatY=Math.sin(this.animTime*4)*2;
        if(opp&&this.state!=='knocked')this.facingRight=opp.x>this.x;
        if(this.state!=='blocking')this.stamina=Math.min(100,this.stamina+0.15);
        else {this.stamina-=0.4;if(this.stamina<=0){this.stamina=0;this.blockPressed=false;}}
        if(this.blockPressed && this.state!=='attacking' && this.state!=='hit' && this.state!=='knocked') this.state='blocking';
        else if(this.state==='blocking' && !this.blockPressed && this.stateTimer<=0) this.state='idle';
        if(this.state==='idle')this.addSuper(0.015);
    }
    draw(ctx) {
        const pulse = this.invulnerable&&Math.floor(Date.now()/80)%2===0;
        if(pulse)ctx.globalAlpha=0.4;
        const scale = 1 + this.z * 0.06;
        ctx.save();
        ctx.translate(this.x, this.y+this.floatY);
        ctx.scale(scale, scale);
        const d = this.facingRight?1:-1;
        ctx.fillStyle='rgba(0,0,0,'+(0.2+this.z*0.03)+')';
        ctx.beginPath();ctx.ellipse(0,3,22+this.z*2,5+this.z*0.5,0,0,Math.PI*2);ctx.fill();
        const col = this.state==='hit'?'#ffaa00':this.color;
        const dk = this.dark;
        ctx.strokeStyle=dk; ctx.lineWidth=9; ctx.lineCap='round';
        const legS = this.state==='walking'?Math.sin(this.animTime*4):0;
        ctx.beginPath();ctx.moveTo(-5,-32);ctx.lineTo(-8+legS*6,-4);ctx.stroke();
        ctx.beginPath();ctx.moveTo(5,-32);ctx.lineTo(8-legS*6,-4);ctx.stroke();
        ctx.fillStyle='#222';ctx.fillRect(-12+legS*5,-4,10,5);ctx.fillRect(5-legS*5,-4,10,5);
        ctx.fillStyle=col;
        ctx.beginPath();ctx.moveTo(-16*d,-72);ctx.lineTo(16*d,-72);ctx.lineTo(18*d,-38);ctx.lineTo(-18*d,-38);ctx.closePath();ctx.fill();
        ctx.fillStyle=dk;ctx.fillRect(-8*d,-66,16,4);
        ctx.fillStyle='#222';ctx.fillRect(-17*d,-40,34,5);
        ctx.fillStyle='#ffcc00';ctx.fillRect(-3,-38,6,3);
        ctx.fillStyle='#e8c4a0';ctx.fillRect(-4,-78,8,8);
        ctx.fillStyle='#e8c4a0';ctx.beginPath();ctx.arc(0,-86,15,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=this.isPlayer?'#332211':'#111';
        if(this.style==='ninja'){ctx.fillRect(-16,-100,32,10);ctx.fillRect(-14,-98,28,12);}
        else if(this.style==='demon'){ctx.beginPath();ctx.moveTo(-15,-90);ctx.lineTo(-25,-110);ctx.lineTo(-5,-98);ctx.closePath();ctx.fill();
            ctx.beginPath();ctx.moveTo(15,-90);ctx.lineTo(25,-110);ctx.lineTo(5,-98);ctx.closePath();ctx.fill();}
        else if(this.style==='cyber'){ctx.fillStyle='#44ff88';ctx.fillRect(-16,-100,32,4);ctx.fillRect(-12,-96,24,2);}
        else{ctx.fillRect(-16,-100,32,12);}
        ctx.fillStyle='#222';const eyeX=4*d;
        ctx.fillRect(eyeX-3,-88,3,3);ctx.fillRect(eyeX+4,-88,3,3);
        ctx.strokeStyle='#222';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(eyeX-5,-92);ctx.lineTo(eyeX-1,-91);ctx.stroke();
        ctx.beginPath();ctx.moveTo(eyeX+5,-91);ctx.lineTo(eyeX+9,-92);ctx.stroke();
        ctx.fillStyle='#c44';
        if(this.state==='hit'||this.state==='knocked'){ctx.beginPath();ctx.arc(0,-79,3,0,Math.PI);ctx.fill();}
        else{ctx.fillRect(-3,-80,6,2);}
        ctx.fillStyle=dk;ctx.fillRect(-15,-95,30,4);ctx.fillRect(-15-d*3,-95,8,14);
        ctx.strokeStyle='#e8c4a0';ctx.lineWidth=7;
        const armSwing=Math.sin(this.animTime*0.5)*3;
        if(this.state==='attacking'){
            const p=1-this.stateTimer/18;let sA=-0.2,eA=-2;
            if(this.attackType==='light'){sA=0;eA=-2.5;}else if(this.attackType==='heavy'){sA=0.3;eA=-2.8;}
            else if(this.attackType==='kick'){sA=-0.5;eA=-1.5;}else if(this.attackType==='special'){sA=0;eA=-3;}
            else if(this.attackType==='ultimate'){sA=0.5;eA=-3.2;}
            const a=sA+(eA-sA)*Math.min(1,p*2);const r=15+Math.abs(a)*10;
            ctx.beginPath();const hX=Math.cos(a)*r*d,hY=-55+Math.sin(a)*r;
            ctx.moveTo(10*d,-58);ctx.lineTo(hX,hY);ctx.stroke();
            if(p>0.15&&p<0.6){ctx.fillStyle='#e8c4a0';ctx.beginPath();ctx.arc(hX,hY,5,0,Math.PI*2);ctx.fill();
                ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.arc(hX+Math.random()*6-3,hY+Math.random()*6-3,5+Math.random()*4,0,Math.PI*2);ctx.fill();}
            if(this.attackType==='special'&&p>0.2&&p<0.7){const g=ctx.createRadialGradient(0,-50,0,0,-50,30);
                g.addColorStop(0,'rgba(255,255,255,0.8)');g.addColorStop(0.5,'rgba(255,200,0,0.4)');g.addColorStop(1,'rgba(255,100,0,0)');
                ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,-50,30,0,Math.PI*2);ctx.fill();}
            if(this.attackType==='ultimate'){const rad=25+Math.random()*10;const g=ctx.createRadialGradient(0,-50,0,0,-50,rad);
                g.addColorStop(0,'rgba(255,255,255,0.9)');g.addColorStop(0.3,'rgba(255,200,50,0.5)');
                g.addColorStop(0.6,'rgba(255,50,50,0.3)');g.addColorStop(1,'rgba(255,0,0,0)');
                ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,-50,rad,0,Math.PI*2);ctx.fill();}
        } else if(this.state==='blocking'){
            ctx.beginPath();ctx.moveTo(10*d,-58);ctx.lineTo(16*d,-78);ctx.stroke();
            ctx.strokeStyle='rgba(68,136,255,0.3)';ctx.lineWidth=2;
            ctx.beginPath();ctx.arc(0,-65,18,0,Math.PI*2);ctx.stroke();
        } else if(this.state==='hit'||this.state==='knocked'){
            ctx.beginPath();ctx.moveTo(10*d,-58);ctx.lineTo(15*d*Math.sin(Date.now()*0.03),-48);ctx.stroke();
        } else {ctx.beginPath();ctx.moveTo(10*d,-58);ctx.lineTo(15*d,-48+armSwing);ctx.stroke();}
        ctx.strokeStyle='#e8c4a0';ctx.lineWidth=6;
        if(this.state==='blocking'){ctx.beginPath();ctx.moveTo(-8*d,-55);ctx.lineTo(-14*d,-78);ctx.stroke();}
        else{ctx.beginPath();ctx.moveTo(-8*d,-55);ctx.lineTo(-13*d,-45-armSwing);ctx.stroke();}
        ctx.restore();ctx.globalAlpha=1;
    }
    reset(x, z) {
        this.x = x; this.z = z || 0; this.y = 0;
        this.vx = 0; this.vy = 0; this.vz = 0;
        this.health = MAX_HP; this.superMeter = 0; this.stamina = 100;
        this.grounded = false; this.state = 'idle'; this.stateTimer = 0;
        this.attackCooldown = 0; this.blockPressed = false;
        this.hitCount = 0; this.invulnerable = false; this.invulnTimer = 0;
        this.attackHit = false;
    }
}

// AI
class AI {
    constructor() { this.timer=0; }
    setDiff(d) { switch(d){case'easy':this.react=0.5;this.aggr=0.2;this.blockChance=0.08;this.comboChance=0.1;break;
        case'normal':this.react=0.3;this.aggr=0.5;this.blockChance=0.2;this.comboChance=0.3;break;
        case'hard':this.react=0.18;this.aggr=0.7;this.blockChance=0.35;this.comboChance=0.5;break;
        case'expert':this.react=0.08;this.aggr=0.9;this.blockChance=0.55;this.comboChance=0.7;break;} }
    update(self, opp, dt) {
        this.timer-=dt;if(this.timer>0)return;
        const dist=Math.abs(self.x-opp.x);self.blockPressed=false;
        this.timer=0.12+Math.random()*0.18;
        if(opp.state==='attacking'&&Math.random()<this.blockChance){self.blockPressed=true;this.timer=0.08;return;}
        if(self.state==='hit')return;
        if(self.health<200&&Math.random()<0.4){if(self.superMeter>=100)self.attack('ultimate');else if(self.superMeter>=30)self.attack('special');else self.attack('heavy');return;}
        const r=Math.random();
        if(dist<75){
            if(r<0.2)self.attack('light');else if(r<0.38)self.attack('heavy');else if(r<0.5)self.attack('kick');
            else if(r<0.6)self.attack('heavy');else if(r<0.68&&self.superMeter>=100)self.attack('ultimate');
            else if(r<0.75&&self.superMeter>=30)self.attack('special');else if(r<0.88)self.blockPressed=true;
            else self.vx=opp.x>self.x?-6:6;
        } else if(dist<170){
            if(r<0.15&&self.superMeter>=30)self.attack('special');else if(r<0.3)self.vx=opp.x>self.x?5:-5;
            else if(r<0.45)self.blockPressed=true;else if(r<0.6)self.vx=opp.x>self.x?7:-7;
            else if(r<0.7)self.attack('kick');else self.vx=opp.x>self.x?3:-3;
        } else {
            if(r<0.5)self.vx=opp.x>self.x?7:-7;else if(r<0.7)self.vx=opp.x>self.x?5:-5;
            else if(r<0.85&&self.superMeter>=30)self.attack('special');else self.vx=opp.x>self.x?4:-4;
        }
        if(self.superMeter>=100&&Math.random()<0.12&&dist<100)self.attack('ultimate');
        else if(self.superMeter>=30&&Math.random()<0.08&&dist<120)self.attack('special');
    }
}

let player, enemy, ai;
function initGame() {
    player = new Fighter(canvas.width*0.33, 0, true, playerChar);
    enemy = new Fighter(canvas.width*0.67, 0, false, enemyChar);
    enemy.color=CHARACTERS[enemyChar].color; enemy.dark=CHARACTERS[enemyChar].dark;
    enemy.name=CHARACTERS[enemyChar].name; enemy.style=CHARACTERS[enemyChar].style;
    ai=new AI();ai.setDiff(difficulty);
    currentRound=1;p1Rounds=0;p2Rounds=0;
    particles=[];floatTexts=[];
    timeLeft=99;frameCount=0;screenShake=0;
}
function resetRound() {
    player.reset(canvas.width*0.33, 0);
    enemy.reset(canvas.width*0.67, 0);
    timeLeft=99;particles=[];floatTexts=[];screenShake=0;
    player.attackCooldown=0;enemy.attackCooldown=0;announce();
}
function announce(){
    announceText='ROUND '+currentRound;announceTimer=90;
    document.getElementById('roundAnnounceText').textContent=announceText;
    document.getElementById('roundAnnounce').classList.add('show');
    setTimeout(()=>document.getElementById('roundAnnounce').classList.remove('show'),1500);
    setTimeout(()=>{announceText='FIGHT!';announceTimer=45;document.getElementById('roundAnnounceText').textContent='FIGHT!';
        document.getElementById('roundAnnounce').classList.add('show');
        setTimeout(()=>{document.getElementById('roundAnnounce').classList.remove('show');if(announceText==='FIGHT!')announceText='';},900);},1400);
}
function endRound(w){
    if(gameState!=='fight')return;gameState='ko';
    if(w==='player'){p1Rounds++;addFloat(canvas.width/2,canvas.height*0.3,'K.O.!','#ffcc00',2.5);}
    else if(w==='enemy'){p2Rounds++;addFloat(canvas.width/2,canvas.height*0.3,'K.O.!','#ff4444',2.5);}
    else addFloat(canvas.width/2,canvas.height*0.3,'TIME!','#888',2.5);
    setTimeout(()=>{if(p1Rounds>=roundsToWin)showResult('player');else if(p2Rounds>=roundsToWin)showResult('enemy');else{currentRound++;gameState='fight';resetRound();}},1800);
}
function showResult(w){
    const rs=document.getElementById('resultScreen'),rt=document.getElementById('resText'),rsb=document.getElementById('resSub');
    if(w==='player'){rt.textContent='YOU WIN!';rt.className='res-win win';rsb.textContent=player.health>800?'✦ PERFECT VICTORY ✦':'Outstanding!';}
    else if(w==='enemy'){rt.textContent='YOU LOSE!';rt.className='res-win lose';rsb.textContent='Better luck next time...';}
    else{rt.textContent='DRAW!';rt.className='res-win';rsb.textContent='Evenly matched!';}
    rs.classList.add('show');
}

function addParticles(x,y,n,c,s=5){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-0.5)*s*2,vy:-Math.random()*s,life:25+Math.random()*15,maxLife:30,color:c,size:2+Math.random()*4});}
function addFloat(x,y,t,c,d=1){floatTexts.push({x,y,text:t,color:c,timer:d,maxTimer:d});}
function checkHit(atk,def){
    if(atk.state!=='attacking'||atk.attackHit)return;
    const p=1-atk.stateTimer/18;let s=0.15,e=0.6;
    if(atk.attackType==='special'){s=0.2;e=0.65;}if(atk.attackType==='ultimate'){s=0.25;e=0.7;}
    if(p<s||p>e)return;
    if(Math.abs(atk.x-def.x)<72){
        atk.attackHit=true;const d=atk.getDmg();
        const bonus=def.hitCount>0?1+(def.hitCount*0.04):1;const fd=Math.round(d.d*bonus);
        if(def.takeDamage(fd,d.k)){atk.addSuper(d.s);if(atk.attackType==='ultimate'){addParticles(def.x,def.y-50,35,'#ff4400',10);addParticles(def.x,def.y-50,20,'#ffaa00',8);}}
    }
}

// ===== VIRTUAL JOYSTICK =====
let joystickCreated = false;
function setupJoystick() {
    if (joystickCreated) return;
    const container = document.getElementById('gameContainer');
    const zone = document.createElement('div');
    zone.id = 'joystickZone';
    zone.innerHTML = `<div id="joystickKnob" style="width:50px;height:50px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.3),rgba(255,255,255,0.1));border:1px solid rgba(255,255,255,0.2);position:absolute;pointer-events:none;"></div>
    <div id="joystickLabel" style="position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:2px;white-space:nowrap;pointer-events:none;">MOVE</div>`;
    container.appendChild(zone);
    const knob = document.getElementById('joystickKnob');
    function handleStart(touch) {
        initAudio();
        JOYSTICK.active = true;
        JOYSTICK.touchId = touch.identifier;
        const rect = zone.getBoundingClientRect();
        JOYSTICK.baseX = rect.left + rect.width/2;
        JOYSTICK.baseY = rect.top + rect.height/2;
        handleMove(touch);
    }
    function handleMove(touch) {
        if (!JOYSTICK.active) return;
        const dx = touch.clientX - JOYSTICK.baseX;
        const dy = touch.clientY - JOYSTICK.baseY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const maxDist = JSTICK_RADIUS;
        let clampedDist = Math.min(dist, maxDist);
        let angle = Math.atan2(dy, dx);
        JOYSTICK.dx = Math.cos(angle) * (clampedDist / maxDist);
        JOYSTICK.dy = Math.sin(angle) * (clampedDist / maxDist);
        const mag = Math.sqrt(JOYSTICK.dx*JOYSTICK.dx + JOYSTICK.dy*JOYSTICK.dy);
        if (mag > 1) { JOYSTICK.dx /= mag; JOYSTICK.dy /= mag; }
        knob.style.transform = `translate(${JOYSTICK.dx * maxDist}px, ${JOYSTICK.dy * maxDist}px)`;
    }
    function handleEnd(touch) {
        if (!touch || touch.identifier === JOYSTICK.touchId) {
            JOYSTICK.active = false;
            JOYSTICK.dx = 0; JOYSTICK.dy = 0;
            JOYSTICK.touchId = -1;
            knob.style.transform = 'translate(0px, 0px)';
        }
    }
    zone.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(e.changedTouches[0]); }, {passive:false});
    zone.addEventListener('touchmove', (e) => { e.preventDefault(); for(let t of e.changedTouches) { if(t.identifier === JOYSTICK.touchId) handleMove(t); } }, {passive:false});
    zone.addEventListener('touchend', (e) => { e.preventDefault(); handleEnd(e.changedTouches[0]); }, {passive:false});
    zone.addEventListener('touchcancel', (e) => { e.preventDefault(); handleEnd(); }, {passive:false});
    joystickCreated = true;
}

let controlsCreated = false;
function setupActionButtons() {
    if (controlsCreated) return;
    const container = document.getElementById('gameContainer');
    const isMobile = 'ontouchstart' in window;
    
    BUTTON_DEFS.forEach(cfg => {
        const layout = buttonLayout[cfg.id];
        if (!layout || !layout.enabled) return;
        const sz = layout.sz || cfg.default.sz;
        const btn = document.createElement('div');
        btn.className = 'ctrl-btn';
        btn.id = cfg.id;
        const fontSize = sz > 52 ? '22px' : sz > 44 ? '18px' : '14px';
        btn.innerHTML = `<span style="font-size:${fontSize}">${cfg.text}</span><span class="lbl">${cfg.label}</span>`;
        btn.style.cssText = `
            width:${sz}px;height:${cfg.id==='btnBlock' ? sz*0.7+'px' : sz+'px'};
            background:${cfg.bg};border:1px solid ${cfg.bd};
            bottom:${layout.y}%;${layout.x<50?'left':'right'}:${layout.x>=50?100-layout.x:layout.x}%;
        `;
        if (cfg.id === 'btnBlock') {
            btn.style.borderRadius = '12px';
        } else {
            btn.style.borderRadius = '50%';
        }
        const onDown = (e) => { e.preventDefault(); btn.style.transform = 'scale(0.88)';
            btn.style.background = cfg.bg.replace('0.08','0.25').replace('0.1','0.3').replace('0.12','0.3');
            btnDown(cfg.id); };
        const onUp = (e) => { e.preventDefault(); btn.style.transform = 'scale(1)'; btn.style.background = cfg.bg; btnUp(cfg.id); };
        btn.addEventListener('touchstart', onDown, {passive:false});
        btn.addEventListener('touchend', onUp, {passive:false});
        btn.addEventListener('touchcancel', onUp, {passive:false});
        if(!isMobile) {
            btn.addEventListener('mousedown', onDown);
            btn.addEventListener('mouseup', onUp);
            btn.addEventListener('mouseleave', onUp);
        }
        container.appendChild(btn);
    });
    controlsCreated = true;
}

const TOUCH = {block: false};
function btnDown(id) {
    if(gameState!=='fight') return;
    initAudio();
    switch(id) {
        case'btnBlock': TOUCH.block=true; player.blockPressed=true; break;
        case'btnLP': player.attack('light'); break;
        case'btnHP': player.attack('heavy'); break;
        case'btnLK': player.attack('kick'); break;
        case'btnHK': player.attack('heavy'); break;
        case'btnSP': player.attack('special'); break;
        case'btnULT': player.attack('ultimate'); break;
    }
}
function btnUp(id) {
    if(id==='btnBlock') { TOUCH.block=false; if(player) player.blockPressed=false; }
}

// Keyboard
document.addEventListener('keydown', e => {
    if(gameState==='fight'){initAudio();
        if(e.key==='a')JOYSTICK.dx=-1;if(e.key==='d')JOYSTICK.dx=1;
        if(e.key==='w')JOYSTICK.dy=-0.7;if(e.key==='s')JOYSTICK.dy=0.7;
        if(e.key===' '||e.key==='Space') player.blockPressed=true;
        if(e.key==='j')player.attack('light');if(e.key==='k')player.attack('heavy');
        if(e.key==='l')player.attack('kick');if(e.key===';'||e.key===':')player.attack('heavy');
        if(e.key==='u')player.attack('special');if(e.key==='i')player.attack('ultimate');
    }
});
document.addEventListener('keyup', e => {
    if(e.key==='a'&&JOYSTICK.dx<0)JOYSTICK.dx=0;if(e.key==='d'&&JOYSTICK.dx>0)JOYSTICK.dx=0;
    if(e.key==='w'&&JOYSTICK.dy<0)JOYSTICK.dy=0;if(e.key==='s'&&JOYSTICK.dy>0)JOYSTICK.dy=0;
    if(e.key===' '||e.key==='Space') player.blockPressed=false;
});

// ===== SETTINGS: DRAGGABLE CUSTOMIZATION =====
let settingsOpen = false;
let settingsLayout = null;
let dragTarget = null, dragOffX = 0, dragOffY = 0, dragTouchId = -1;

function openSettings() {
    if (gameState !== 'menu') return;
    settingsOpen = true;
    // Clone the layout for editing
    settingsLayout = JSON.parse(JSON.stringify(buttonLayout));
    document.getElementById('settingsScreen').classList.add('show');
    renderSettingsButtons();
}

function closeSettings() {
    settingsOpen = false;
    document.getElementById('settingsScreen').classList.remove('show');
    // Discard unsaved changes? Actually we auto-save but let's not auto-save on close
    // The "Done" button saves explicitly
}

function renderSettingsButtons() {
    const content = document.getElementById('settingsContent');
    // Remove old setting buttons but keep hint and tray
    content.querySelectorAll('.setting-btn').forEach(el => el.remove());
    
    const hint = document.getElementById('settingsHint');
    const tray = document.getElementById('deletedTray');
    
    // Render tray first
    tray.innerHTML = '<span class="tray-label">🗑️ Deleted:</span>';
    let deletedCount = 0;
    BUTTON_DEFS.forEach(cfg => {
        const l = settingsLayout[cfg.id];
        if (!l || !l.enabled) {
            deletedCount++;
            const item = document.createElement('div');
            item.className = 'del-item';
            item.textContent = cfg.text;
            item.title = 'Tap to restore ' + cfg.label;
            item.addEventListener('click', (e) => { e.stopPropagation(); restoreButton(cfg.id); });
            item.addEventListener('touchstart', (e) => { e.stopPropagation(); restoreButton(cfg.id); }, {passive:true});
            tray.appendChild(item);
        }
    });
    if (deletedCount === 0) {
        tray.innerHTML = '<span class="tray-label" style="opacity:0.2">All buttons active</span>';
    }
    
    // Render enabled buttons
    BUTTON_DEFS.forEach(cfg => {
        const l = settingsLayout[cfg.id];
        if (!l || !l.enabled) return;
        
        const btn = document.createElement('div');
        btn.className = 'setting-btn';
        btn.dataset.id = cfg.id;
        
        const sz = l.sz || cfg.default.sz;
        btn.style.cssText = `
            width:${sz}px; height:${sz}px;
            bottom:${l.y}%; ${l.x<50?'left':'right'}:${l.x>=50?100-l.x:l.x}%;
        `;
        btn.innerHTML = `
            <span style="font-size:${sz > 52 ? '22px' : '18px'}">${cfg.text}</span>
            <span style="font-size:7px;opacity:0.5;display:block">${cfg.label}</span>
            <button class="del-btn" data-id="${cfg.id}">✕</button>
            <div class="size-ctrl">
                <input type="range" min="36" max="76" value="${sz}">
                <span class="size-num">${sz}</span>
            </div>
        `;
        content.appendChild(btn);
        
        // Delete button
        btn.querySelector('.del-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            deleteButton(cfg.id);
        });
        btn.querySelector('.del-btn').addEventListener('touchstart', (e) => {
            e.stopPropagation();
            deleteButton(cfg.id);
        }, {passive:true});
        
        // Size slider
        const slider = btn.querySelector('input[type=range]');
        const sizeNum = btn.querySelector('.size-num');
        slider.addEventListener('input', () => {
            const v = parseInt(slider.value);
            sizeNum.textContent = v;
            const w = v + 'px';
            const h = cfg.id === 'btnBlock' ? Math.round(v*0.7)+'px' : w;
            btn.style.width = w;
            btn.style.height = h;
            settingsLayout[cfg.id].sz = v;
        });
        slider.addEventListener('touchstart', (e) => e.stopPropagation(), {passive:true});
        slider.addEventListener('mousedown', (e) => e.stopPropagation());
        
        // Drag handlers
        setupDragHandlers(btn, cfg.id);
    });
}

function setupDragHandlers(btn, id) {
    const startDrag = (clientX, clientY, identifier) => {
        const r = btn.getBoundingClientRect();
        dragTarget = { id, el: btn };
        dragOffX = clientX - r.left - r.width/2;
        dragOffY = clientY - r.top - r.height/2;
        dragTouchId = identifier;
        btn.classList.add('dragging');
    };
    
    const moveDrag = (clientX, clientY) => {
        if (!dragTarget) return;
        const container = document.getElementById('settingsContent');
        const cr = container.getBoundingClientRect();
        // Calculate position as percentage
        let px = ((clientX - dragOffX) - cr.left) / cr.width * 100;
        let py = ((clientY - dragOffY) - cr.top) / cr.height * 100;
        // Clamp
        px = Math.max(1, Math.min(98, px));
        py = Math.max(1, Math.min(94, py));
        
        const l = settingsLayout[id];
        l.x = px;
        l.y = py;
        
        const el = dragTarget.el;
        el.style.bottom = py + '%';
        if (px < 50) {
            el.style.left = px + '%';
            el.style.right = 'auto';
        } else {
            el.style.right = (100 - px) + '%';
            el.style.left = 'auto';
        }
    };
    
    const endDrag = () => {
        if (dragTarget) {
            dragTarget.el.classList.remove('dragging');
            dragTarget = null;
            dragTouchId = -1;
        }
    };
    
    // Touch
    btn.addEventListener('touchstart', (e) => {
        if (e.target.closest('.del-btn') || e.target.closest('.size-ctrl')) return;
        e.preventDefault();
        const touch = e.changedTouches[0];
        startDrag(touch.clientX, touch.clientY, touch.identifier);
    }, {passive: false});
    
    document.addEventListener('touchmove', (e) => {
        if (!dragTarget) return;
        for (let t of e.changedTouches) {
            if (t.identifier === dragTouchId) {
                e.preventDefault();
                moveDrag(t.clientX, t.clientY);
            }
        }
    }, {passive: false});
    
    document.addEventListener('touchend', (e) => {
        if (!dragTarget) return;
        for (let t of e.changedTouches) {
            if (t.identifier === dragTouchId) {
                endDrag();
            }
        }
    });
    
    document.addEventListener('touchcancel', () => { endDrag(); });
    
    // Mouse
    btn.addEventListener('mousedown', (e) => {
        if (e.target.closest('.del-btn') || e.target.closest('.size-ctrl')) return;
        e.preventDefault();
        startDrag(e.clientX, e.clientY, -1);
    });
    
    document.addEventListener('mousemove', (e) => {
        if (!dragTarget || dragTouchId !== -1) return;
        moveDrag(e.clientX, e.clientY);
    });
    
    document.addEventListener('mouseup', () => {
        if (dragTarget && dragTouchId === -1) endDrag();
    });
}

function deleteButton(id) {
    if (settingsLayout[id]) {
        settingsLayout[id].enabled = false;
        renderSettingsButtons();
    }
}

function restoreButton(id) {
    if (settingsLayout[id]) {
        settingsLayout[id].enabled = true;
        renderSettingsButtons();
    }
}

function saveSettings() {
    saveButtonLayout(settingsLayout);
    // Recreate controls with new layout
    destroyControls();
    setupActionButtons();
    closeSettings();
}

function destroyControls() {
    BUTTON_DEFS.forEach(cfg => {
        const el = document.getElementById(cfg.id);
        if (el) el.remove();
    });
    controlsCreated = false;
}

// UI Events
document.getElementById('settingsBtn').addEventListener('click', () => { initAudio(); openSettings(); });
document.getElementById('settingsClose').addEventListener('click', closeSettings);
document.getElementById('settingsSaveBtn').addEventListener('click', saveSettings);
document.getElementById('settingsResetBtn').addEventListener('click', () => {
    settingsLayout = resetButtonLayout();
    renderSettingsButtons();
});
document.getElementById('settingsAddBtn').addEventListener('click', () => {
    // Restore all disabled buttons
    BUTTON_DEFS.forEach(cfg => {
        if (settingsLayout[cfg.id]) settingsLayout[cfg.id].enabled = true;
    });
    renderSettingsButtons();
});

// ===== GAME LOOP =====
let lastTime = 0;

function update(dt) {
    if(gameState!=='fight')return;
    frameCount++;
    if(announceText){announceTimer--;if(announceTimer<=0)announceText='';return;}
    if(frameCount>60){timeLeft-=dt;if(timeLeft<=0){timeLeft=0;endRound(player.health>enemy.health?'player':player.health<enemy.health?'enemy':'draw');return;}}
    
    const jx = JOYSTICK.dx, jy = JOYSTICK.dy;
    if (jx !== 0 || jy !== 0) {
        const speed = 5.5;
        player.vx = jx * speed;
        player.vz = -jy * speed * 0.5;
        if(player.state==='idle'||player.state==='walking') player.state='walking';
    } else if(player.state==='walking') {
        player.state='idle';
    }
    
    ai.update(enemy,player,dt);
    player.update(dt,enemy); enemy.update(dt,player);
    const dist=Math.abs(player.x-enemy.x);
    const md=player.w*0.55;
    if(dist<md){const p=(md-dist)/2;const dir=player.x<enemy.x?-1:1;player.x+=dir*p;enemy.x-=dir*p;}
    checkHit(player,enemy);checkHit(enemy,player);
    screenShake*=0.88;if(screenShake<0.1)screenShake=0;
    particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;return p.life>0;});
    floatTexts=floatTexts.filter(f=>{f.y-=0.6;f.timer-=dt;return f.timer>0;});
    if(player.health<=0)endRound('enemy');
    else if(enemy.health<=0)endRound('player');
}

function draw() {
    const W=canvas.width,H=canvas.height;
    ctx.clearRect(0,0,W,H);ctx.save();
    if(screenShake>0.5)ctx.translate((Math.random()-0.5)*screenShake,(Math.random()-0.5)*screenShake);
    
    const sky=ctx.createLinearGradient(0,0,0,H*GROUND_RATIO);
    sky.addColorStop(0,'#0a0015');sky.addColorStop(0.3,'#150830');sky.addColorStop(0.6,'#1a0a30');sky.addColorStop(1,'#0d0520');
    ctx.fillStyle=sky;ctx.fillRect(0,0,W,H*GROUND_RATIO);
    ctx.fillStyle='rgba(255,255,255,0.5)';
    for(let i=0;i<50;i++){const sx=(i*139.7+i*i*7.1)%W,sy=(i*91.3+i*i*3.9)%(H*GROUND_RATIO*0.5);
        ctx.globalAlpha=0.2+Math.sin(Date.now()*0.0008+i)*0.3;ctx.fillRect(sx,sy,1.5,1.5);}
    ctx.globalAlpha=1;
    ctx.fillStyle='#ffe8d0';ctx.beginPath();ctx.arc(W*0.87,H*0.1,28,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0a0015';ctx.beginPath();ctx.arc(W*0.87+7,H*0.1-4,24,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0a0518';
    for(let i=0;i<W/28;i++){const bx=i*28,cbh=40+Math.sin(i*1.7)*25+Math.sin(i*0.4)*15;ctx.fillRect(bx,H*GROUND_RATIO-20-cbh,26,cbh+20);}
    ctx.fillStyle='rgba(255,200,100,0.3)';
    for(let i=0;i<W/28;i++){if(i%3===0)continue;const lx=i*28+4,ly=H*GROUND_RATIO-20-(40+Math.sin(i*1.7)*25+Math.sin(i*0.4)*15)+8;ctx.fillRect(lx,ly,2,2);ctx.fillRect(lx+13,ly+10,2,2);}
    const gg=ctx.createLinearGradient(0,H*GROUND_RATIO,0,H);
    gg.addColorStop(0,'#221133');gg.addColorStop(0.3,'#150820');gg.addColorStop(1,'#0a0410');
    ctx.fillStyle=gg;ctx.fillRect(0,H*GROUND_RATIO,W,H);
    ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
    for(let i=0;i<12;i++){ctx.beginPath();ctx.moveTo(i*(W/12),H*GROUND_RATIO);ctx.lineTo(i*(W/12)+12,H);ctx.stroke();}
    ctx.strokeStyle='rgba(255,68,68,0.12)';ctx.lineWidth=2;ctx.setLineDash([5,10]);
    ctx.beginPath();ctx.moveTo(18,H*GROUND_RATIO);ctx.lineTo(18,H);ctx.stroke();
    ctx.beginPath();ctx.moveTo(W-18,H*GROUND_RATIO);ctx.lineTo(W-18,H);ctx.stroke();ctx.setLineDash([]);
    
    const fighters = [player, enemy].sort((a,b)=>a.z-b.z);
    fighters.forEach(f=>f.draw(ctx));
    
    particles.forEach(p=>{ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;
        ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});
    ctx.globalAlpha=1;
    floatTexts.forEach(f=>{ctx.globalAlpha=f.timer/f.maxTimer;ctx.fillStyle=f.color;
        ctx.font='bold 20px Arial';ctx.textAlign='center';ctx.strokeStyle='#000';ctx.lineWidth=3;
        ctx.strokeText(f.text,f.x,f.y);ctx.fillText(f.text,f.x,f.y);});
    ctx.globalAlpha=1;
    ctx.restore();

    const barW=W*0.38,barH=20,barY=22,bx1=W*0.02,bx2=W*0.6;
    ctx.fillStyle='#222';ctx.fillRect(bx1,barY,barW,barH);
    const p1P=player.health/player.maxHealth;ctx.fillStyle=p1P>0.5?'#33cc44':p1P>0.25?'#cccc33':'#cc3333';
    ctx.fillRect(bx1+2,barY+2,(barW-4)*p1P,barH-4);
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;ctx.strokeRect(bx1,barY,barW,barH);
    ctx.fillStyle='#222';ctx.fillRect(bx2,barY,barW,barH);
    const p2P=enemy.health/enemy.maxHealth;ctx.fillStyle=p2P>0.5?'#33cc44':p2P>0.25?'#cccc33':'#cc3333';
    const ef=(barW-4)*p2P;ctx.fillRect(bx2+barW-2-ef,barY+2,ef,barH-4);ctx.strokeRect(bx2,barY,barW,barH);
    ctx.fillStyle='#fff';ctx.font='bold 11px Arial';ctx.textAlign='left';ctx.fillText(Math.ceil(player.health),bx1+6,barY+14);
    ctx.textAlign='right';ctx.fillText(Math.ceil(enemy.health),bx2+barW-6,barY+14);
    ctx.font='bold 13px Arial';ctx.textAlign='left';ctx.fillStyle=player.color;ctx.fillText(player.name,bx1,barY-6);
    ctx.textAlign='right';ctx.fillStyle=enemy.color;ctx.fillText(enemy.name,bx2+barW,barY-6);
    const sbW=barW*0.65,sbH=5,sbY=barY+barH+3;
    ctx.fillStyle='#222';ctx.fillRect(bx1,sbY,sbW,sbH);
    const p1s=player.superMeter/player.maxSuper;ctx.fillStyle=p1s>=1?'#ffcc00':'#4488ff';
    ctx.fillRect(bx1+1,sbY+1,(sbW-2)*p1s,sbH-2);
    ctx.fillStyle='#222';ctx.fillRect(bx2+barW-sbW,sbY,sbW,sbH);
    const p2s=enemy.superMeter/enemy.maxSuper;ctx.fillStyle=p2s>=1?'#ffcc00':'#4488ff';
    ctx.fillRect(bx2+barW-sbW+1,sbY+1,(sbW-2)*p2s,sbH-2);
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='7px Arial';ctx.textAlign='left';ctx.fillText('SUPER',bx1,sbY+4);ctx.textAlign='right';ctx.fillText('SUPER',bx2+barW,sbY+4);
    const cx=W/2;ctx.textAlign='center';
    ctx.font='bold 13px Arial';ctx.fillStyle='#888';
    let rt='';for(let i=0;i<Math.max(1,roundsToWin*2-1);i++){if(i<p1Rounds)rt+='● ';else if(i<p1Rounds+p2Rounds)rt+='○ ';else rt+='· ';}
    ctx.fillText(rt.trim(),cx,16);
    ctx.font='bold 28px Arial';ctx.fillStyle=timeLeft<10?'#ff4444':timeLeft<30?'#ffaa00':'#fff';
    ctx.fillText(Math.ceil(timeLeft),cx,barY+barH+26);
    ctx.font='11px Arial';ctx.fillStyle='#666';ctx.fillText('ROUND '+currentRound,cx,barY-12);
    if(enemy.hitCount>2){ctx.font='bold 26px Arial';ctx.textAlign='center';ctx.fillStyle='#ff8800';ctx.strokeStyle='#000';ctx.lineWidth=3;
        ctx.strokeText(enemy.hitCount+' HIT COMBO!',cx,H*0.38);ctx.fillText(enemy.hitCount+' HIT COMBO!',cx,H*0.38);}
    if(announceText){ctx.font='bold 56px Arial';ctx.textAlign='center';ctx.strokeStyle='#000';ctx.lineWidth=4;
        ctx.fillStyle=announceText==='FIGHT!'?'#ff4444':'#fff';ctx.strokeText(announceText,cx,H*0.35);ctx.fillText(announceText,cx,H*0.35);}
    if(!('ontouchstart'in window)&&frameCount<240){ctx.font='10px Arial';ctx.fillStyle='rgba(255,255,255,0.2)';ctx.textAlign='center';
        ctx.fillText('WASD:Move  Space:Block  J:LP  K:HP  L:LK  ;:HK  U:SP  I:ULT',cx,H-16);}
}

function loop(ts) {
    const dt=Math.min(0.05,(ts-lastTime)/1000);lastTime=ts;
    if(gameState==='fight'||gameState==='ko'){update(dt);draw();}
    else {ctx.clearRect(0,0,canvas.width,canvas.height);}
    requestAnimationFrame(loop);
}

// Character select
function setupCharSelect() {
    const grid=document.getElementById('charGrid');grid.innerHTML='';
    CHARACTERS.forEach((c,i)=>{const card=document.createElement('div');
        card.className='char-card'+(i===playerChar?' selected':'');
        card.innerHTML=`<div class=\"char-avatar\">${c.emoji}</div><div class=\"char-name\">${c.name}</div><div class=\"char-desc\">${c.desc}</div>`;
        card.addEventListener('click',()=>{document.querySelectorAll('.char-card').forEach(c=>c.classList.remove('selected'));
            card.classList.add('selected');playerChar=i;enemyChar=(i+1)%CHARACTERS.length;if(enemyChar===playerChar)enemyChar=(playerChar+1)%CHARACTERS.length;});
        grid.appendChild(card);});
}

document.getElementById('startBtn').addEventListener('click',()=>{initAudio();

    document.getElementById('menuScreen').classList.remove('hidden');gameState='menu';});

requestAnimationFrame(loop);
