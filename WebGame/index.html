<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LES FIGHT - Web Edition</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; touch-action: none; -webkit-user-select: none; user-select: none; }

@media (orientation: portrait) {
  #rotateHint { display: flex !important; }
  #gameContainer { display: none !important; }
}
#rotateHint {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #000; color: #fff; display: none;
  flex-direction: column; align-items: center; justify-content: center; z-index: 999;
  font-size: 24px; text-align: center; padding: 20px;
}
#rotateHint .icon { font-size: 60px; margin-bottom: 20px; animation: rotate 2s infinite; }
@keyframes rotate { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(90deg)} }

#gameContainer { width: 100%; height: 100%; position: relative; overflow: hidden; }
canvas { display: block; width: 100%; height: 100%; }

/* Menu */
#menuScreen {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(180deg, #0d0d1a 0%, #1a0a0a 40%, #0d0d1a 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
    transition: opacity 0.6s;
}
#menuScreen.hidden { opacity: 0; pointer-events: none; }
.menu-title {
    font-size: clamp(36px, 6vw, 72px); font-weight: 900; letter-spacing: 6px;
    background: linear-gradient(135deg, #ff2200, #ff6600, #ffcc00, #ff6600, #ff2200);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 2px; line-height: 1;
}
.menu-sub { color: rgba(255,255,255,0.3); font-size: clamp(9px, 1.2vw, 14px); letter-spacing: 10px; margin-bottom: 20px; }
.menu-row { display: flex; flex-direction: column; align-items: center; margin: 4px 0; gap: 3px; }
.menu-row label { color: #888; font-size: clamp(9px, 1vw, 12px); letter-spacing: 2px; text-transform: uppercase; }
.menu-row select { padding: 6px 14px; font-size: clamp(12px, 1.2vw, 15px); background: #1a1a2e; color: #fff; border: 1px solid #ff444488; border-radius: 8px; text-align: center; min-width: 120px; }
.play-btn { padding: 14px 50px; margin-top: 14px; font-size: clamp(16px, 2vw, 24px); font-weight: 900; border: none; background: linear-gradient(135deg, #ff4400, #ff6600); color: #fff; border-radius: 50px; cursor: pointer; letter-spacing: 3px; box-shadow: 0 4px 30px rgba(255,68,0,0.4); }
.play-btn:active { transform: scale(0.95); }

#settingsBtn {
    position: absolute; top: 12px; right: 16px; z-index: 101;
    font-size: clamp(22px, 3vw, 30px); cursor: pointer; opacity: 0.4;
    transition: opacity 0.3s; padding: 8px; color:#fff;
}
#settingsBtn:hover, #settingsBtn:active { opacity: 0.9; }

#settingsScreen {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(5, 2, 12, 0.96); z-index: 200;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none; transition: opacity 0.4s;
    overflow: hidden;
}
#settingsScreen.show { opacity: 1; pointer-events: all; }
#settingsHeader { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; flex-shrink: 0; }
#settingsTitle { font-size: clamp(16px, 2vw, 22px); font-weight: 900; color: #fff; letter-spacing: 2px; }
#settingsClose { font-size: clamp(20px, 2.5vw, 28px); color: #ff4444; cursor: pointer; padding: 6px 10px; }
#settingsContent { flex: 1; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); margin: 4px 10px; border-radius: 12px; background: rgba(0,0,0,0.3); }
#settingsHint { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.2); font-size: clamp(10px, 1vw, 13px); text-align: center; letter-spacing: 1px; pointer-events: none; z-index: 10; white-space: nowrap; }
#settingsFooter { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px 18px; flex-shrink: 0; flex-wrap: wrap; }
.settings-btn { padding: 8px 22px; font-size: clamp(11px, 1.2vw, 14px); font-weight: bold; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #fff; border-radius: 20px; cursor: pointer; letter-spacing: 1px; }
.settings-btn:active { transform: scale(0.95); }
.settings-btn.reset { border-color: #ff444466; color: #ff6666; }
.settings-btn.save { border-color: #44ff8866; color: #66ff88; background: rgba(68,255,136,0.1); }
.settings-btn.add { border-color: #4488ff66; color: #6688ff; }

.setting-btn { position: absolute; z-index: 20; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; cursor: grab; touch-action: none; border: 2px solid rgba(255,255,255,0.12); transition: border-color 0.2s, box-shadow 0.2s; background: rgba(255,255,255,0.04); }
.setting-btn.dragging { border-color: #ff6600; box-shadow: 0 0 30px rgba(255,102,0,0.3); z-index: 50; cursor: grabbing; }
.setting-btn .del-btn { position: absolute; top: -8px; right: -8px; width: 22px; height: 22px; border-radius: 50%; background: #ff3333; border: none; color: #fff; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.8; z-index: 25; }
.setting-btn .del-btn:active { opacity: 1; transform: scale(1.2); }
.setting-btn .size-ctrl { position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%); width: 80px; display: flex; align-items: center; gap: 4px; opacity: 0.6; pointer-events: auto; }
.setting-btn .size-ctrl input[type=range] { width: 100%; height: 3px; -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.2); border-radius: 2px; outline: none; }
.setting-btn .size-ctrl input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #ff6600; cursor: pointer; }
.setting-btn .size-num { font-size: 8px; color: rgba(255,255,255,0.5); min-width: 18px; text-align: center; }

#deletedTray { position: absolute; bottom: 0; left: 0; right: 0; padding: 6px; background: rgba(255,68,68,0.06); border-top: 1px solid rgba(255,68,68,0.1); display: flex; gap: 6px; flex-wrap: wrap; align-items: center; justify-content: center; min-height: 40px; }
#deletedTray .tray-label { font-size: 9px; color: rgba(255,255,255,0.2); letter-spacing: 1px; margin-right: 4px; }
#deletedTray .del-item { width: 40px; height: 40px; border-radius: 50%; border: 1px dashed rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; opacity: 0.5; background: rgba(255,255,255,0.03); color:#fff; }
#deletedTray .del-item:active { opacity: 1; background: rgba(255,255,255,0.1); }

#resultScreen { position: absolute; top:0;left:0;width:100%;height:100%; background: rgba(0,0,0,0.88); display:flex;flex-direction:column; align-items:center;justify-content:center;z-index:50; opacity:0;pointer-events:none;transition:opacity 0.5s; }
#resultScreen.show{opacity:1;pointer-events:all;}
.res-win{font-size:clamp(32px,5vw,56px);font-weight:900;margin-bottom:4px;}
.res-win.win{color:#ffcc00;text-shadow:0 0 40px rgba(255,204,0,0.3);}
.res-win.lose{color:#ff4444;}
.res-sub{color:#aaa;font-size:clamp(12px,1.4vw,18px);margin-bottom:20px;}
.res-btn{padding:10px 36px;margin:4px;font-size:clamp(13px,1.4vw,17px);font-weight:bold;border:2px solid #ff4444;background:transparent;color:#fff;border-radius:50px;cursor:pointer;letter-spacing:2px;min-width:140px;}
.res-btn:active{background:#ff4444;color:#000;transform:scale(0.95);}

#roundAnnounce{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:40;opacity:0;pointer-events:none;}
#roundAnnounce.show{opacity:1;}
.round-text{font-size:clamp(44px,10vw,100px);font-weight:900;color:#fff;-webkit-text-stroke:3px #ff4444;text-stroke:3px #ff4444;text-shadow:0 0 60px rgba(255,68,68,0.4);}

#charSelectScreen{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#0d0d1a 0%,#1a0a0a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:60;opacity:0;pointer-events:none;transition:opacity 0.5s;}
#charSelectScreen.show{opacity:1;pointer-events:all;}
.char-title{font-size:clamp(18px,2.5vw,30px);font-weight:900;color:#fff;margin-bottom:14px;letter-spacing:3px;}
.char-grid{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:500px;}
.char-card{width:clamp(80px,14vw,130px);height:clamp(110px,18vw,170px);border:2px solid #333;border-radius:10px;background:#111122;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;padding:8px;}
.char-card.selected{border-color:#ff6600;box-shadow:0 0 25px rgba(255,102,0,0.3);}
.char-card:active{transform:scale(0.95);}
.char-avatar{font-size:clamp(32px,5vw,56px);margin-bottom:6px;color:#fff;}
.char-name{color:#fff;font-size:clamp(10px,1vw,13px);font-weight:bold;letter-spacing:1px;}
.char-desc{color:#888;font-size:clamp(7px,0.8vw,10px);margin-top:2px;}
.char-select-btn{margin-top:14px;padding:10px 40px;font-size:clamp(14px,1.8vw,20px);font-weight:900;border:none;background:linear-gradient(135deg,#ff4400,#ff6600);color:#fff;border-radius:50px;cursor:pointer;letter-spacing:2px;box-shadow:0 4px 30px rgba(255,68,0,0.3);}
.char-select-btn:active{transform:scale(0.95);}

#joystickZone { position: absolute; bottom: 10%; left: 3%; width: 130px; height: 130px; z-index: 10; border-radius: 50%; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; }
#joystickKnob { width: 50px; height: 50px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.3), rgba(255,255,255,0.1)); border: 1px solid rgba(255,255,255,0.2); position: absolute; transition: none; pointer-events: none; }
#joystickLabel { position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%); font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 2px; white-space: nowrap; pointer-events: none; }

.ctrl-btn { position: absolute; z-index: 10; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; font-size: 18px; transition: transform 0.1s, background 0.1s; backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); pointer-events: auto; }
.ctrl-btn .lbl { font-size: 7px; opacity: 0.7; display: block; margin-top: -1px; }
.ctrl-btn i { font-size: inherit; }
#btnBlock { position: absolute; z-index: 10; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.1s, background 0.1s; backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); }
</style>
</head>
<body>
<div id="rotateHint">
    <div class="icon">📱</div>
    <div>Please rotate your phone to <b>landscape mode</b></div>
    <div style="font-size:16px;color:#888;margin-top:10px">↻ Turn your phone sideways</div>
</div>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>

    <div id="menuScreen">
        <div class="menu-title">LES FIGHT</div>
        <div class="menu-sub">WEB EDITION</div>
        <div class="menu-row">
            <label>Difficulty</label>
            <select id="diffSelect">
                <option value="easy">🐣 Easy</option>
                <option value="normal" selected>🥊 Normal</option>
                <option value="hard">🔥 Hard</option>
                <option value="expert">💀 Expert</option>
            </select>
        </div>
        <div class="menu-row">
            <label>Match</label>
            <select id="roundsSelect">
                <option value="1">1 Round</option>
                <option value="2" selected>Best of 3</option>
                <option value="3">Best of 5</option>
            </select>
        </div>
        <button class="play-btn" id="startBtn"><i class="fa-solid fa-crosshairs"></i> FIGHT</button>
        <div id="settingsBtn"><i class="fa-solid fa-sliders"></i></div>
    </div>

    <div id="settingsScreen">
        <div id="settingsHeader">
            <div id="settingsTitle"><i class="fa-solid fa-gamepad"></i> CUSTOMIZE CONTROLS</div>
            <div id="settingsClose"><i class="fa-solid fa-xmark"></i></div>
        </div>
        <div id="settingsContent">
            <div id="settingsHint"><i class="fa-solid fa-arrows-up-down-left-right"></i> Drag to move &nbsp;·&nbsp; <i class="fa-solid fa-xmark"></i> to remove &nbsp;·&nbsp; <i class="fa-solid fa-sliders"></i> for size</div>
            <div id="deletedTray"></div>
        </div>
        <div id="settingsFooter">
            <button class="settings-btn add" id="settingsAddBtn"><i class="fa-solid fa-plus"></i> Add all</button>
            <button class="settings-btn reset" id="settingsResetBtn"><i class="fa-solid fa-rotate-left"></i> Reset</button>
            <button class="settings-btn save" id="settingsSaveBtn"><i class="fa-solid fa-check"></i> Done</button>
        </div>
    </div>

    <div id="charSelectScreen">
        <div class="char-title"><i class="fa-solid fa-user"></i> SELECT YOUR FIGHTER</div>
        <div class="char-grid" id="charGrid"></div>
        <button class="char-select-btn" id="charConfirmBtn"><i class="fa-solid fa-check"></i> FIGHT!</button>
    </div>

    <div id="resultScreen">
        <div class="res-win" id="resText">YOU WIN!</div>
        <div class="res-sub" id="resSub">Perfect Victory!</div>
        <button class="res-btn" id="rematchBtn"><i class="fa-solid fa-arrow-rotate-right"></i> Rematch</button>
        <button class="res-btn" id="menuBtn" style="margin-top:2px"><i class="fa-solid fa-house"></i> Menu</button>
    </div>

    <div id="roundAnnounce"><div class="round-text" id="roundAnnounceText">ROUND 1</div></div>
</div>

<script>
// ============================================================
// LES FIGHT v5 - Font Awesome Icons + Realistic Human Fighters
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

// Audio
let actx = null;
function initAudio() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); }
function playHit(p=1) { if(!actx)return; try{const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type='sawtooth';o.frequency.setValueAtTime(180*p,actx.currentTime);o.frequency.exponentialRampToValueAtTime(40,actx.currentTime+0.12);g.gain.setValueAtTime(0.3,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.15);o.start();o.stop(actx.currentTime+0.15)}catch(e){} }
function playBlock() { if(!actx)return; try{const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type='square';o.frequency.setValueAtTime(400,actx.currentTime);o.frequency.exponentialRampToValueAtTime(80,actx.currentTime+0.05);g.gain.setValueAtTime(0.12,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.08);o.start();o.stop(actx.currentTime+0.08)}catch(e){} }
function playKO() { if(!actx)return; try{const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type='sawtooth';o.frequency.setValueAtTime(250,actx.currentTime);o.frequency.exponentialRampToValueAtTime(15,actx.currentTime+0.6);g.gain.setValueAtTime(0.35,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.7);o.start();o.stop(actx.currentTime+0.7)}catch(e){} }
function playSpecial() { if(!actx)return; try{const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type='sine';o.frequency.setValueAtTime(600,actx.currentTime);o.frequency.exponentialRampToValueAtTime(1500,actx.currentTime+0.15);o.frequency.exponentialRampToValueAtTime(300,actx.currentTime+0.35);g.gain.setValueAtTime(0.25,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.4);o.start();o.stop(actx.currentTime+0.4)}catch(e){} }
function playUltimate() { if(!actx)return; try{const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type='sawtooth';o.frequency.setValueAtTime(80,actx.currentTime);o.frequency.exponentialRampToValueAtTime(2000,actx.currentTime+0.5);o.frequency.exponentialRampToValueAtTime(30,actx.currentTime+0.9);g.gain.setValueAtTime(0.35,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+1);o.start();o.stop(actx.currentTime+1)}catch(e){} }

const MAX_HP = 1000, MAX_SUPER = 100, GRAVITY = 0.55, GROUND_RATIO = 0.74;

// ===== CHARACTERS =====
const CHARACTERS = [
    { id:'dragon', name:'DRAGON FIST', icon:'<i class="fa-solid fa-dragon"></i>', desc:'Karate master', color:'#ff4422', dark:'#cc2211', skin:'#d4a574', style:'karate', hair:'#332211' },
    { id:'shadow', name:'SHADOW BLADE', icon:'<i class="fa-solid fa-mask"></i>', desc:'Silent ninja', color:'#8844ff', dark:'#6622cc', skin:'#c9a87c', style:'ninja', hair:'#111111' },
    { id:'titan', name:'TITAN', icon:'<i class="fa-solid fa-fist-raised"></i>', desc:'Power puncher', color:'#44aaff', dark:'#2288cc', skin:'#b8956a', style:'boxing', hair:'#553311' },
    { id:'phoenix', name:'PHOENIX', icon:'<i class="fa-solid fa-feather"></i>', desc:'Kick specialist', color:'#ff6644', dark:'#cc4422', skin:'#e0b88c', style:'kickboxing', hair:'#884422' },
    { id:'cyber', name:'CYBER', icon:'<i class="fa-solid fa-robot"></i>', desc:'Tech warrior', color:'#44ff88', dark:'#22cc66', skin:'#c0c0c0', style:'cyber', hair:'#44ff88' },
    { id:'oni', name:'ONI', icon:'<i class="fa-solid fa-skull"></i>', desc:'Demon warrior', color:'#cc2244', dark:'#991133', skin:'#a06040', style:'demon', hair:'#000000' },
];

let gameState = 'menu', difficulty = 'normal', roundsToWin = 2;
let currentRound = 1, p1Rounds = 0, p2Rounds = 0;
let frameCount = 0, timeLeft = 99;
let announceText = '', announceTimer = 0, screenShake = 0;
let particles = [], floatTexts = [];
let playerChar = 0, enemyChar = 1;
const JOYSTICK = { active: false, touchId: -1, dx: 0, dy: 0, baseX: 0, baseY: 0 };
const JSTICK_RADIUS = 55;

// ===== BUTTON LAYOUT =====
const BUTTON_DEFS = [
    { id:'btnLP', text:'<i class="fa-solid fa-hand-back-fist"></i>', label:'LP', default:{x:72,y:45,sz:50}, bg:'rgba(255,255,255,0.08)', bd:'rgba(255,255,255,0.15)' },
    { id:'btnHP', text:'<i class="fa-solid fa-hand-fist"></i>', label:'HP', default:{x:78,y:36,sz:54}, bg:'rgba(255,200,0,0.1)', bd:'rgba(255,200,0,0.2)' },
    { id:'btnLK', text:'<i class="fa-solid fa-shoe-prints"></i>', label:'LK', default:{x:84,y:45,sz:50}, bg:'rgba(255,255,255,0.08)', bd:'rgba(255,255,255,0.15)' },
    { id:'btnHK', text:'<i class="fa-solid fa-boot"></i>', label:'HK', default:{x:78,y:54,sz:54}, bg:'rgba(255,200,0,0.1)', bd:'rgba(255,200,0,0.2)' },
    { id:'btnSP', text:'<i class="fa-solid fa-bolt"></i>', label:'SP', default:{x:91,y:38,sz:52}, bg:'rgba(255,200,0,0.12)', bd:'rgba(255,200,0,0.3)' },
    { id:'btnULT', text:'<i class="fa-solid fa-star"></i>', label:'ULT', default:{x:91,y:52,sz:52}, bg:'rgba(255,68,68,0.12)', bd:'rgba(255,68,68,0.3)' },
    { id:'btnBlock', text:'<i class="fa-solid fa-shield"></i>', label:'BLOCK', default:{x:10,y:28,sz:60}, bg:'rgba(68,136,255,0.1)', bd:'rgba(68,136,255,0.25)' },
];

function getDefaultLayout() { const l={}; BUTTON_DEFS.forEach(b=>{l[b.id]={x:b.default.x,y:b.default.y,sz:b.default.sz,enabled:true};}); return l; }
let buttonLayout = null;
function loadButtonLayout() {
    try {
        const saved = localStorage.getItem('lesfight_btns');
        if (saved) {
            const parsed = JSON.parse(saved);
            const def = getDefaultLayout();
            Object.keys(def).forEach(k => {
                if (!parsed[k]) parsed[k] = def[k];
                else { if (parsed[k].x===undefined) parsed[k].x=def[k].x; if (parsed[k].y===undefined) parsed[k].y=def[k].y; if (parsed[k].sz===undefined) parsed[k].sz=def[k].sz; if (parsed[k].enabled===undefined) parsed[k].enabled=true; }
            });
            buttonLayout = parsed; return parsed;
        }
    } catch(e) {}
    buttonLayout = getDefaultLayout(); return getDefaultLayout();
}
function saveButtonLayout(layout) { buttonLayout = layout; try { localStorage.setItem('lesfight_btns', JSON.stringify(layout)); } catch(e) {} }
function resetButtonLayout() { const def = getDefaultLayout(); saveButtonLayout(def); return def; }
loadButtonLayout();

// ===== FIGHTER CLASS =====
class Fighter {
    constructor(x, z, isPlayer, charIdx) {
        this.x = x; this.z = z || 0; this.y = 0;
        this.vx = 0; this.vy = 0; this.vz = 0;
        this.w = 64; this.h = 140;
        this.isPlayer = isPlayer;
        this.charIdx = charIdx || 0;
        const c = CHARACTERS[this.charIdx];
        this.color = c.color; this.dark = c.dark; this.skin = c.skin; this.hairColor = c.hair;
        this.name = c.name; this.style = c.style;
        this.facingRight = isPlayer;
        this.health = MAX_HP; this.maxHealth = MAX_HP;
        this.superMeter = 0; this.maxSuper = MAX_SUPER;
        this.stamina = 100;
        this.grounded = false;
        this.state = 'idle'; this.stateTimer = 0;
        this.attackCooldown = 0; this.blockPressed = false;
        this.hitCount = 0; this.invulnerable = false; this.invulnTimer = 0;
        this.attackType = ''; this.attackHit = false;
        this.animTime = 0; this.floatY = 0;
        this.wins = 0; this.comboActive = 0;
        // Walking animation
        this.walkCycle = 0;
    }
    get groundY() { return canvas.height * GROUND_RATIO + this.z * 15; }
    get hitbox() {
        const hw = this.w*0.35, hh = this.h*0.4;
        let ox = 0; if(this.state==='blocking') ox = this.facingRight?-10:10;
        return {x:this.x+ox-hw, y:this.y-hh, w:hw*2, h:hh*2};
    }
    get atkBox() {
        const reach = 55+this.w*0.25;
        const cx = this.facingRight ? this.x+this.w*0.3 : this.x-this.w*0.3;
        return {x:cx-reach/2, y:this.y-this.h*0.4, w:reach, h:this.h*0.5};
    }
    takeDamage(amount, kb=5) {
        if(this.invulnerable) return false;
        if(this.state==='blocking') {
            amount*=0.12; playBlock();
            this.vx = this.facingRight?kb*0.4:-kb*0.4;
            this.hitCount = 0; this.addSuper(2);
            addFloat(this.x, this.y-60, '<i class="fa-solid fa-shield-halved"></i> BLOCK!', '#44aaff', 0.7);
            return amount>0;
        }
        this.state='hit'; this.stateTimer=14;
        this.health = Math.max(0, this.health-amount);
        this.vx = this.facingRight?kb:-kb;
        this.vy = -3-Math.random()*3;
        this.hitCount++; this.comboActive = this.hitCount;
        this.addSuper(amount*0.07);
        screenShake = Math.min(18, amount*0.07+3);
        playHit(0.8+amount*0.003);
        if(this.hitCount>2) addFloat(this.x, this.y-80, this.hitCount+' HIT!', '#ff8800', 0.8);
        addParticles(this.x, this.y-50, 8+amount*0.04, '#ffff44', 5);
        addFloat(this.x+(Math.random()-0.5)*20, this.y-60-Math.random()*20, '-'+Math.round(amount), amount>150?'#ff4400':amount>80?'#ffaa00':'#fff', 0.7);
        if(this.health<=0) { this.state='knocked'; this.stateTimer=90; this.vy=-10; this.vx=this.facingRight?18:-18; playKO(); }
        return true;
    }
    addSuper(a) { this.superMeter = Math.min(this.maxSuper, this.superMeter+a); }
    getDmg() {
        switch(this.attackType) {
            case'light': return {d:30+Math.random()*10,k:4,s:5};
            case'heavy': return {d:65+Math.random()*15,k:10,s:9};
            case'kick': return {d:45+Math.random()*12,k:6,s:7};
            case'special': return {d:130+Math.random()*20,k:16,s:0};
            case'ultimate': return {d:220+Math.random()*30,k:22,s:0};
            default: return {d:25,k:3,s:3};
        }
    }
    attack(type) {
        if(this.attackCooldown>0||this.state==='hit'||this.state==='knocked') return;
        if(type==='special'&&this.superMeter<30){addFloat(this.x,this.y-50,'<i class="fa-solid fa-circle-exclamation"></i> NOT ENOUGH!','#ff4444',0.6);return;}
        if(type==='ultimate'&&this.superMeter<100){addFloat(this.x,this.y-50,'<i class="fa-solid fa-circle-exclamation"></i> NOT ENOUGH!','#ff4444',0.6);return;}
        this.state='attacking'; this.stateTimer=18; this.attackType=type; this.attackHit=false;
        this.attackCooldown = type==='light'?10:type==='heavy'?20:type==='kick'?14:type==='special'?28:38;
        if(type==='special'){this.superMeter-=30;playSpecial();}
        if(type==='ultimate'){this.superMeter-=100;playUltimate();}
    }
    update(dt, opp) {
        this.stateTimer--; if(this.attackCooldown>0) this.attackCooldown--;
        this.vy+=GRAVITY; this.x+=this.vx; this.y+=this.vy; this.z+=this.vz;
        this.vx*=0.88; this.vz*=0.88;
        const gy = canvas.height * GROUND_RATIO + this.z * 12;
        if(this.y>=gy){this.y=gy;this.vy=0;this.grounded=true;}
        this.x = Math.max(30, Math.min(canvas.width-30, this.x));
        this.z = Math.max(-3, Math.min(3, this.z));
        if(this.invulnerable){this.invulnTimer--;if(this.invulnTimer<=0)this.invulnerable=false;}
        if(this.state==='hit'&&this.stateTimer<=0){this.state='idle';this.attackCooldown=0;this.hitCount=0;}
        if(this.state==='knocked'&&this.stateTimer<=0){this.state='idle';this.hitCount=0;}
        if(this.state==='attacking'&&this.stateTimer<=0)this.state='idle';
        this.animTime+=dt*3;
        if(this.state==='idle')this.floatY=Math.sin(this.animTime)*3;
        else if(this.state==='hit')this.floatY=Math.sin(Date.now()*0.06)*5;
        else this.floatY=Math.sin(this.animTime*4)*2;
        if(opp&&this.state!=='knocked')this.facingRight=opp.x>this.x;
        // Walk cycle
        if(this.state==='walking') this.walkCycle += dt * 8;
        else this.walkCycle *= 0.9;
        if(this.state!=='blocking')this.stamina=Math.min(100,this.stamina+0.15);
        else {this.stamina-=0.4;if(this.stamina<=0){this.stamina=0;this.blockPressed=false;}}
        if(this.blockPressed && this.state!=='attacking' && this.state!=='hit' && this.state!=='knocked') this.state='blocking';
        else if(this.state==='blocking' && !this.blockPressed && this.stateTimer<=0) this.state='idle';
        if(this.state==='idle')this.addSuper(0.015);
    }

    // ===== DETAILED HUMAN DRAWING =====
    draw(ctx) {
        const pulse = this.invulnerable && Math.floor(Date.now()/80)%2===0;
        if(pulse) ctx.globalAlpha = 0.4;
        const scale = 1 + this.z * 0.06;
        ctx.save();
        ctx.translate(this.x, this.y + this.floatY);
        ctx.scale(scale, scale);
        const d = this.facingRight ? 1 : -1;
        
        // Shadow on ground
        ctx.fillStyle='rgba(0,0,0,'+(0.2+this.z*0.03)+')';
        ctx.beginPath(); ctx.ellipse(0, 3, 24+this.z*2, 6+this.z*0.5, 0, 0, Math.PI*2); ctx.fill();
        
        const skin = this.state==='hit' ? '#ffcc88' : this.skin;
        const main = this.state==='hit' ? '#ffaa00' : this.color;
        const dark = this.dark;
        const legAnim = Math.sin(this.walkCycle);
        
        // ===== LEGS =====
        // Back leg
        ctx.save();
        const bkLegSwing = legAnim * 8;
        ctx.translate(-5 * d, -38);
        // Thigh
        const thighGrad = ctx.createLinearGradient(0, 0, 8*d, 0);
        thighGrad.addColorStop(0, dark); thighGrad.addColorStop(0.5, main); thighGrad.addColorStop(1, dark);
        ctx.fillStyle = thighGrad;
        ctx.beginPath(); ctx.ellipse(3*d, -8, 7, 14, 0, 0, Math.PI*2); ctx.fill();
        // Calf
        ctx.translate(bkLegSwing*0.3, -8);
        const calfGrad = ctx.createLinearGradient(0, 0, 6*d, 0);
        calfGrad.addColorStop(0, dark); calfGrad.addColorStop(0.5, main); calfGrad.addColorStop(1, dark);
        ctx.fillStyle = calfGrad;
        ctx.beginPath(); ctx.ellipse(2*d, -12, 6, 12, 0, 0, Math.PI*2); ctx.fill();
        // Shoe
        ctx.fillStyle = '#333';
        ctx.beginPath(); ctx.ellipse(1*d, -23, 7, 5, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#555';
        ctx.fillRect(-3*d, -25, 8, 3);
        ctx.restore();
        
        // Front leg
        ctx.save();
        const fLegSwing = legAnim * 8;
        ctx.translate(5 * d, -38);
        const thighGrad2 = ctx.createLinearGradient(0, 0, 8*d, 0);
        thighGrad2.addColorStop(0, dark); thighGrad2.addColorStop(0.4, main); thighGrad2.addColorStop(1, dark);
        ctx.fillStyle = thighGrad2;
        ctx.beginPath(); ctx.ellipse(-2*d, -8, 7, 14, 0, 0, Math.PI*2); ctx.fill();
        ctx.translate(fLegSwing*0.3, -8);
        const calfGrad2 = ctx.createLinearGradient(0, 0, 6*d, 0);
        calfGrad2.addColorStop(0, dark); calfGrad2.addColorStop(0.4, main); calfGrad2.addColorStop(1, dark);
        ctx.fillStyle = calfGrad2;
        ctx.beginPath(); ctx.ellipse(-1*d, -12, 6, 12, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#333';
        ctx.beginPath(); ctx.ellipse(-2*d, -23, 7, 5, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#555';
        ctx.fillRect(-4*d, -25, 8, 3);
        ctx.restore();

        // ===== HIPS / WAIST =====
        const hipGrad = ctx.createLinearGradient(-12*d, 0, 12*d, 0);
        const hipCol = this.style==='ninja'?'#1a1a2e':this.style==='cyber'?'#333355':dark;
        hipGrad.addColorStop(0, hipCol); hipGrad.addColorStop(0.5, main); hipGrad.addColorStop(1, hipCol);
        ctx.fillStyle = hipGrad;
        ctx.beginPath(); ctx.ellipse(0, -42, 13, 8, 0, 0, Math.PI*2); ctx.fill();
        // Belt
        ctx.fillStyle = '#222';
        ctx.fillRect(-10*d, -46, 20, 3);
        if(this.style==='karate') { ctx.fillStyle = '#fff'; ctx.fillRect(-1, -46, 2, 6); }

        // ===== TORSO =====
        ctx.save();
        ctx.translate(0, -52);
        // Chest - muscular shape
        const chestGrad = ctx.createLinearGradient(-14*d, 0, 14*d, 0);
        chestGrad.addColorStop(0, dark); chestGrad.addColorStop(0.3, main); chestGrad.addColorStop(0.7, main); chestGrad.addColorStop(1, dark);
        ctx.fillStyle = chestGrad;
        ctx.beginPath();
        ctx.moveTo(-14*d, 0);
        ctx.quadraticCurveTo(-16*d, -20, -12*d, -30);
        ctx.lineTo(12*d, -30);
        ctx.quadraticCurveTo(16*d, -20, 14*d, 0);
        ctx.closePath(); ctx.fill();
        
        // Chest highlight
        const chestHi = ctx.createLinearGradient(0, -5, 0, -25);
        chestHi.addColorStop(0, 'rgba(255,255,255,0.15)'); chestHi.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = chestHi;
        ctx.beginPath();
        ctx.moveTo(-8*d, -5); ctx.quadraticCurveTo(-10*d, -20, -6*d, -28);
        ctx.lineTo(6*d, -28); ctx.quadraticCurveTo(10*d, -20, 8*d, -5);
        ctx.closePath(); ctx.fill();

        // Abs definition
        if(this.style!=='cyber'&&this.style!=='ninja') {
            ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1;
            for(let i=0; i<4; i++) {
                ctx.beginPath(); ctx.moveTo(-5*d, -8 - i*5); ctx.lineTo(5*d, -8 - i*5); ctx.stroke();
            }
            ctx.beginPath(); ctx.moveTo(0, -5); ctx.lineTo(0, -25); ctx.stroke();
        }

        // ===== ARMS =====
        const armSwing = Math.sin(this.animTime * 0.5) * 3;
        
        // Back arm
        ctx.save();
        ctx.translate(-10*d, -8);
        const bicepGrad = ctx.createLinearGradient(0, 0, 6*d, 0);
        bicepGrad.addColorStop(0, dark); bicepGrad.addColorStop(0.5, skin); bicepGrad.addColorStop(1, dark);
        ctx.fillStyle = bicepGrad;
        ctx.beginPath(); ctx.ellipse(0, -6, 5, 10, 0.2*d, 0, Math.PI*2); ctx.fill();
        ctx.translate(bkLegSwing*0.15, -6);
        const foreGrad = ctx.createLinearGradient(0, 0, 5*d, 0);
        foreGrad.addColorStop(0, dark); foreGrad.addColorStop(0.5, skin); foreGrad.addColorStop(1, dark);
        ctx.fillStyle = foreGrad;
        ctx.beginPath(); ctx.ellipse(0, -10, 4, 10, 0, 0, Math.PI*2); ctx.fill();
        // Glove
        ctx.fillStyle = this.style==='boxing'?'#ff2222':this.style==='cyber'?'#44ff88':'#eee';
        ctx.beginPath(); ctx.arc(0, -18, 5, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        // Front arm
        ctx.save();
        ctx.translate(10*d, -8);
        let armAngle = 0;
        if(this.state==='attacking') {
            const p = 1 - this.stateTimer/18;
            if(this.attackType==='light') armAngle = -1.5 - p*1.2;
            else if(this.attackType==='heavy') armAngle = -1.8 - p*1.5;
            else if(this.attackType==='kick') armAngle = -0.5;
            else if(this.attackType==='special') armAngle = -2 - p*2;
            else if(this.attackType==='ultimate') armAngle = -2.5 - p*2.2;
        } else if(this.state==='blocking') {
            armAngle = -2.2;
        } else {
            armAngle = -0.3 - armSwing*0.2;
        }
        
        const armLen = 18;
        const endX = Math.sin(armAngle) * armLen * d;
        const endY = Math.cos(Math.abs(armAngle)) * armLen;
        
        // Upper arm
        const uaGrad = ctx.createLinearGradient(0, 0, 6*d, 0);
        uaGrad.addColorStop(0, dark); uaGrad.addColorStop(0.4, skin); uaGrad.addColorStop(1, dark);
        ctx.fillStyle = uaGrad;
        ctx.beginPath(); ctx.ellipse(0, -6, 6, 11, 0.2*d, 0, Math.PI*2); ctx.fill();
        
        // Lower arm pointing toward attack direction
        ctx.translate(endX*0.35, -6 + endY*0.35);
        const laGrad = ctx.createLinearGradient(0, 0, 5*d, 0);
        laGrad.addColorStop(0, dark); laGrad.addColorStop(0.4, skin); laGrad.addColorStop(1, dark);
        ctx.fillStyle = laGrad;
        const laAngle = Math.atan2(endX, -endY);
        ctx.beginPath(); ctx.ellipse(0, -7, 5, 10, laAngle, 0, Math.PI*2); ctx.fill();
        
        // Fist/glove
        if(this.state==='attacking') {
            ctx.fillStyle = '#ffcc00';
            const glow = ctx.createRadialGradient(0, -15, 0, 0, -15, 12);
            glow.addColorStop(0, 'rgba(255,200,0,0.4)'); glow.addColorStop(1, 'rgba(255,200,0,0)');
            ctx.fillStyle = glow;
            ctx.beginPath(); ctx.arc(0, -15, 12, 0, Math.PI*2); ctx.fill();
        }
        ctx.fillStyle = this.style==='boxing'?'#ff2222':this.style==='cyber'?'#44ff88':'#eee';
        ctx.beginPath(); ctx.arc(0, -14, 6, 0, Math.PI*2); ctx.fill();
        if(this.state==='attacking'&&(this.attackType==='special'||this.attackType==='ultimate')) {
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.beginPath(); ctx.arc(0, -14, 8, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();

        // ===== SHOULDERS =====
        ctx.fillStyle = dark;
        ctx.beginPath();
        ctx.moveTo(-14*d, -30); ctx.quadraticCurveTo(-18*d, -32, -16*d, -26); ctx.lineTo(-14*d, -28); ctx.closePath(); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(14*d, -30); ctx.quadraticCurveTo(18*d, -32, 16*d, -26); ctx.lineTo(14*d, -28); ctx.closePath(); ctx.fill();

        // ===== NECK =====
        ctx.fillStyle = skin;
        ctx.fillRect(-4*d, -36, 8, 6);
        // Adams apple detail
        ctx.fillStyle = 'rgba(0,0,0,0.08)';
        ctx.beginPath(); ctx.ellipse(0, -33, 3, 2, 0, 0, Math.PI*2); ctx.fill();

        // ===== HEAD =====
        ctx.save();
        ctx.translate(0, -40);
        // Head shape
        const headGrad = ctx.createRadialGradient(-3*d, -5, 0, -3*d, -5, 16);
        headGrad.addColorStop(0, lighten(skin, 30)); headGrad.addColorStop(0.7, skin); headGrad.addColorStop(1, darken(skin, 20));
        ctx.fillStyle = headGrad;
        ctx.beginPath();
        ctx.moveTo(-14*d, 0);
        ctx.quadraticCurveTo(-16*d, -12, -12*d, -20);
        ctx.quadraticCurveTo(-8*d, -26, 0, -26);
        ctx.quadraticCurveTo(8*d, -26, 12*d, -20);
        ctx.quadraticCurveTo(16*d, -12, 14*d, 0);
        ctx.quadraticCurveTo(0, 4, -14*d, 0);
        ctx.closePath(); ctx.fill();

        // Jaw line
        ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(-12*d, -2); ctx.quadraticCurveTo(0, 3, 12*d, -2);
        ctx.stroke();

        // ===== FACIAL FEATURES =====
        // Eyes
        const eyeY = -12, eyeSpacing = 5;
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.ellipse((-eyeSpacing-1)*d, eyeY, 4, 3, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse((eyeSpacing-1)*d, eyeY, 4, 3, 0, 0, Math.PI*2); ctx.fill();
        // Iris
        ctx.fillStyle = this.style==='cyber'?'#44ff88':this.style==='demon'?'#ff2222':'#442211';
        ctx.beginPath(); ctx.arc((-eyeSpacing-1)*d, eyeY, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc((eyeSpacing-1)*d, eyeY, 2.5, 0, Math.PI*2); ctx.fill();
        // Pupil
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc((-eyeSpacing-1)*d, eyeY, 1.2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc((eyeSpacing-1)*d, eyeY, 1.2, 0, Math.PI*2); ctx.fill();
        // Eye shine
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath(); ctx.arc((-eyeSpacing)*d, eyeY-1, 0.8, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc((eyeSpacing)*d, eyeY-1, 0.8, 0, Math.PI*2); ctx.fill();

        // Eyebrows
        ctx.strokeStyle = this.hairColor; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo((-eyeSpacing-4)*d, eyeY-5); ctx.lineTo((-eyeSpacing+2)*d, eyeY-4); ctx.stroke();
        ctx.beginPath(); ctx.moveTo((eyeSpacing-2)*d, eyeY-4); ctx.lineTo((eyeSpacing+4)*d, eyeY-5); ctx.stroke();

        // Nose
        ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(-1*d, -10); ctx.lineTo(-1*d, -6); ctx.lineTo(1*d, -6); ctx.stroke();
        ctx.fillStyle = 'rgba(0,0,0,0.05)';
        ctx.beginPath(); ctx.ellipse(1*d, -5, 2, 1.5, 0, 0, Math.PI*2); ctx.fill();

        // Mouth
        if(this.state==='hit'||this.state==='attacking') {
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.ellipse(0, -1, 4, 3, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#a22';
            ctx.beginPath(); ctx.ellipse(0, -1, 3, 2, 0, 0, Math.PI*2); ctx.fill();
        } else {
            ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(0, -2, 4, 0.1, Math.PI-0.1); ctx.stroke();
        }

        // ===== HAIR =====
        ctx.fillStyle = this.hairColor;
        if(this.style==='ninja') {
            // Ninja headband + hair
            ctx.fillRect(-14*d, -26, 28, 5);
            ctx.fillStyle = '#222'; ctx.fillRect(-14*d, -28, 28, 3);
            // Headband tails
            ctx.fillRect(-14*d, -26, -4, -8);
            ctx.fillRect(14*d, -26, 4, -6);
        } else if(this.style==='demon') {
            // Wild spiky hair
            ctx.beginPath(); ctx.moveTo(-14*d, -20);
            for(let i=0; i<6; i++) ctx.lineTo((-14+i*6)*d, -28-Math.random()*6);
            ctx.closePath(); ctx.fill();
            // Horns
            ctx.fillStyle = '#444';
            ctx.beginPath(); ctx.moveTo(-10*d, -24); ctx.lineTo(-14*d, -36); ctx.lineTo(-7*d, -24); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(10*d, -24); ctx.lineTo(14*d, -36); ctx.lineTo(7*d, -24); ctx.closePath(); ctx.fill();
        } else if(this.style==='cyber') {
            // Cyber mohawk
            ctx.fillStyle = '#44ff88';
            ctx.fillRect(-3*d, -32, 6, 8);
            ctx.fillStyle = '#88ffbb';
            ctx.fillRect(-2*d, -34, 4, 4);
        } else if(this.style==='boxing') {
            // Short curly hair
            ctx.beginPath(); ctx.arc(0, -24, 14, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = darken(this.hairColor, 20);
            ctx.fillRect(-12*d, -28, 24, 3);
        } else if(this.style==='kickboxing') {
            // Flowing back hair
            ctx.fillRect(-14*d, -26, 28, 6);
            ctx.fillRect(-12*d, -24, 24, 4);
            // Ponytail
            ctx.save(); ctx.translate(0, -20);
            ctx.fillRect(-2*d, 0, 4, 10);
            ctx.fillRect(-3*d, 8, 6, 4);
            ctx.restore();
        } else {
            // Default: spiky martial arts hair
            ctx.beginPath(); ctx.moveTo(-14*d, -20);
            for(let i=0; i<8; i++) ctx.lineTo((-14+i*4)*d, -28-Math.sin(i*1.2)*3);
            ctx.closePath(); ctx.fill();
            // Headband
            ctx.fillStyle = this.color;
            ctx.fillRect(-14*d, -24, 28, 3);
        }

        // ===== CLOTHING DETAILS =====
        if(this.style==='karate') {
            // Karate gi top
            ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(-3*d, -35); ctx.lineTo(-3*d, -20); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(3*d, -35); ctx.lineTo(3*d, -20); ctx.stroke();
            // Belt knot
            ctx.fillStyle = '#fff';
            ctx.fillRect(-3, -45, 6, 3);
        }
        if(this.style==='boxing') {
            // Boxing trunks
            ctx.fillStyle = this.color;
            ctx.fillRect(-12*d, -44, 24, 6);
            ctx.fillStyle = '#fff';
            ctx.fillRect(-1, -44, 2, 6);
        }
        if(this.style==='cyber') {
            // Cyber armor lines
            ctx.strokeStyle = 'rgba(68,255,136,0.3)'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(-8*d, -10); ctx.lineTo(-8*d, -40); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(8*d, -10); ctx.lineTo(8*d, -40); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-5*d, -20); ctx.lineTo(5*d, -20); ctx.stroke();
            // Glowing dots
            ctx.fillStyle = '#44ff88';
            ctx.beginPath(); ctx.arc(-8*d, -15, 1.5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(8*d, -15, 1.5, 0, Math.PI*2); ctx.fill();
        }
        if(this.style==='demon') {
            // Face paint markings
            ctx.strokeStyle = 'rgba(255,0,0,0.3)'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(-10*d, -2); ctx.lineTo(-6*d, -5); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(10*d, -2); ctx.lineTo(6*d, -5); ctx.stroke();
        }
        if(this.style==='ninja') {
            // Ninja suit v-neck
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath(); ctx.moveTo(0, -32); ctx.lineTo(-6*d, -22); ctx.lineTo(6*d, -22); ctx.closePath(); ctx.fill();
        }
        
        ctx.restore(); // head
        ctx.restore(); // main
        ctx.globalAlpha = 1;
    }

    reset(x, z) {
        this.x = x; this.z = z || 0; this.y = 0;
        this.vx = 0; this.vy = 0; this.vz = 0;
        this.health = MAX_HP; this.superMeter = 0; this.stamina = 100;
        this.grounded = false; this.state = 'idle'; this.stateTimer = 0;
        this.attackCooldown = 0; this.blockPressed = false;
        this.hitCount = 0; this.invulnerable = false; this.invulnTimer = 0;
        this.attackHit = false; this.walkCycle = 0;
    }
}

// ===== COLOR HELPERS =====
function lighten(hex, amt) {
    let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,r+amt); g=Math.min(255,g+amt); b=Math.min(255,b+amt);
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function darken(hex, amt) {
    let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    r=Math.max(0,r-amt); g=Math.max(0,g-amt); b=Math.max(0,b-amt);
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

// ===== AI =====
class AI {
    constructor() { this.timer=0; }
    setDiff(d) { switch(d){case'easy':this.react=0.5;this.aggr=0.2;this.blockChance=0.08;this.comboChance=0.1;break;
        case'normal':this.react=0.3;this.aggr=0.5;this.blockChance=0.2;this.comboChance=0.3;break;
        case'hard':this.react=0.18;this.aggr=0.7;this.blockChance=0.35;this.comboChance=0.5;break;
        case'expert':this.react=0.08;this.aggr=0.9;this.blockChance=0.55;this.comboChance=0.7;break;} }
    update(self, opp, dt) {
        this.timer-=dt;if(this.timer>0)return;
        const dist=Math.abs(self.x-opp.x);self.blockPressed=false;
        this.timer=0.12+Math.random()*0.18;
        if(opp.state==='attacking'&&Math.random()<this.blockChance){self.blockPressed=true;this.timer=0.08;return;}
        if(self.state==='hit')return;
        if(self.health<200&&Math.random()<0.4){if(self.superMeter>=100)self.attack('ultimate');else if(self.superMeter>=30)self.attack('special');else self.attack('heavy');return;}
        const r=Math.random();
        if(dist<75){
            if(r<0.2)self.attack('light');else if(r<0.38)self.attack('heavy');else if(r<0.5)self.attack('kick');
            else if(r<0.6)self.attack('heavy');else if(r<0.68&&self.superMeter>=100)self.attack('ultimate');
            else if(r<0.75&&self.superMeter>=30)self.attack('special');else if(r<0.88)self.blockPressed=true;
            else self.vx=opp.x>self.x?-6:6;
        } else if(dist<170){
            if(r<0.15&&self.superMeter>=30)self.attack('special');else if(r<0.3)self.vx=opp.x>self.x?5:-5;
            else if(r<0.45)self.blockPressed=true;else if(r<0.6)self.vx=opp.x>self.x?7:-7;
            else if(r<0.7)self.attack('kick');else self.vx=opp.x>self.x?3:-3;
        } else {
            if(r<0.5)self.vx=opp.x>self.x?7:-7;else if(r<0.7)self.vx=opp.x>self.x?5:-5;
            else if(r<0.85&&self.superMeter>=30)self.attack('special');else self.vx=opp.x>self.x?4:-4;
        }
        if(self.superMeter>=100&&Math.random()<0.12&&dist<100)self.attack('ultimate');
        else if(self.superMeter>=30&&Math.random()<0.08&&dist<120)self.attack('special');
    }
}

function addParticles(x,y,n,c,s=5){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-0.5)*s*2,vy:-Math.random()*s,life:25+Math.random()*15,maxLife:30,color:c,size:2+Math.random()*4});}
function addFloat(x,y,t,c,d=1){floatTexts.push({x,y,text:t,color:c,timer:d,maxTimer:d});}
function checkHit(atk,def){
    if(atk.state!=='attacking'||atk.attackHit)return;
    const p=1-atk.stateTimer/18;let s=0.15,e=0.6;
    if(atk.attackType==='special'){s=0.2;e=0.65;}if(atk.attackType==='ultimate'){s=0.25;e=0.7;}
    if(p<s||p>e)return;
    if(Math.abs(atk.x-def.x)<72){
        atk.attackHit=true;const d=atk.getDmg();
        const bonus=def.hitCount>0?1+(def.hitCount*0.04):1;const fd=Math.round(d.d*bonus);
        if(def.takeDamage(fd,d.k)){atk.addSuper(d.s);if(atk.attackType==='ultimate'){addParticles(def.x,def.y-50,35,'#ff4400',10);addParticles(def.x,def.y-50,20,'#ffaa00',8);}}
    }
}

// ===== JOYSTICK =====
let joystickCreated = false;
function setupJoystick() {
    if (joystickCreated) return;
    const container = document.getElementById('gameContainer');
    const zone = document.createElement('div');
    zone.id = 'joystickZone';
    zone.innerHTML = '<div id="joystickKnob"></div><div id="joystickLabel">MOVE</div>';
    container.appendChild(zone);
    const knob = document.getElementById('joystickKnob');
    function handleStart(touch) {
        initAudio(); JOYSTICK.active = true; JOYSTICK.touchId = touch.identifier;
        const rect = zone.getBoundingClientRect();
        JOYSTICK.baseX = rect.left + rect.width/2; JOYSTICK.baseY = rect.top + rect.height/2;
        handleMove(touch);
    }
    function handleMove(touch) {
        if (!JOYSTICK.active) return;
        const dx = touch.clientX - JOYSTICK.baseX, dy = touch.clientY - JOYSTICK.baseY;
        const dist = Math.sqrt(dx*dx + dy*dy); const maxDist = JSTICK_RADIUS;
        let clampedDist = Math.min(dist, maxDist); let angle = Math.atan2(dy, dx);
        JOYSTICK.dx = Math.cos(angle) * (clampedDist / maxDist);
        JOYSTICK.dy = Math.sin(angle) * (clampedDist / maxDist);
        const mag = Math.sqrt(JOYSTICK.dx*JOYSTICK.dx + JOYSTICK.dy*JOYSTICK.dy);
        if (mag > 1) { JOYSTICK.dx /= mag; JOYSTICK.dy /= mag; }
        knob.style.transform = 'translate('+(JOYSTICK.dx*maxDist)+'px,'+(JOYSTICK.dy*maxDist)+'px)';
    }
    function handleEnd(touch) {
        if (!touch || touch.identifier === JOYSTICK.touchId) {
            JOYSTICK.active = false; JOYSTICK.dx = 0; JOYSTICK.dy = 0;
            JOYSTICK.touchId = -1; knob.style.transform = 'translate(0px, 0px)';
        }
    }
    zone.addEventListener('touchstart', e=>{e.preventDefault();handleStart(e.changedTouches[0]);},{passive:false});
    zone.addEventListener('touchmove', e=>{e.preventDefault();for(let t of e.changedTouches){if(t.identifier===JOYSTICK.touchId)handleMove(t);}},{passive:false});
    zone.addEventListener('touchend', e=>{e.preventDefault();handleEnd(e.changedTouches[0]);},{passive:false});
    zone.addEventListener('touchcancel', e=>{e.preventDefault();handleEnd();},{passive:false});
    joystickCreated = true;
}

function setupDragHandlers(btn,id){
    const startDrag=(clientX,clientY,identifier)=>{const r=btn.getBoundingClientRect();dragTarget={id,el:btn};dragOffX=clientX-r.left-r.width/2;dragOffY=clientY-r.top-r.height/2;dragTouchId=identifier;btn.classList.add('dragging');};
    const moveDrag=(clientX,clientY)=>{if(!dragTarget)return;const cr=document.getElementById('settingsContent').getBoundingClientRect();let px=((clientX-dragOffX)-cr.left)/cr.width*100,py=((clientY-dragOffY)-cr.top)/cr.height*100;px=Math.max(1,Math.min(98,px));py=Math.max(1,Math.min(94,py));const l=settingsLayout[id];l.x=px;l.y=py;const el=dragTarget.el;el.style.bottom=py+'%';if(px<50){el.style.left=px+'%';el.style.right='auto';}else{el.style.right=(100-px)+'%';el.style.left='auto';}};
    const endDrag=()=>{if(dragTarget){dragTarget.el.classList.remove('dragging');dragTarget=null;dragTouchId=-1;}};
    btn.addEventListener('touchstart',e=>{if(e.target.closest('.del-btn')||e.target.closest('.size-ctrl'))return;e.preventDefault();startDrag(e.changedTouches[0].clientX,e.changedTouches[0].clientY,e.changedTouches[0].identifier);},{passive:false});
    document.addEventListener('touchmove',e=>{if(!dragTarget)return;for(let t of e.changedTouches){if(t.identifier===dragTouchId){e.preventDefault();moveDrag(t.clientX,t.clientY);}}},{passive:false});
    document.addEventListener('touchend',e=>{if(!dragTarget)return;for(let t of e.changedTouches){if(t.identifier===dragTouchId)endDrag();}});
    document.addEventListener('touchcancel',()=>{endDrag();});
    btn.addEventListener('mousedown',e=>{if(e.target.closest('.del-btn')||e.target.closest('.size-ctrl'))return;e.preventDefault();startDrag(e.clientX,e.clientY,-1);});
    document.addEventListener('mousemove',e=>{if(!dragTarget||dragTouchId!==-1)return;moveDrag(e.clientX,e.clientY);});
    document.addEventListener('mouseup',()=>{if(dragTarget&&dragTouchId===-1)endDrag();});
}

// ===== GAME LOOP =====
let lastTime = 0;
function update(dt) {
    if(gameState!=='fight')return;
    frameCount++;
    if(announceText){announceTimer--;if(announceTimer<=0)announceText='';return;}
    if(frameCount>60){timeLeft-=dt;if(timeLeft<=0){timeLeft=0;endRound(player.health>enemy.health?'player':player.health<enemy.health?'enemy':'draw');return;}}
    const jx=JOYSTICK.dx,jy=JOYSTICK.dy;
    if(jx!==0||jy!==0){player.vx=jx*5.5;player.vz=-jy*5.5*0.5;if(player.state==='idle'||player.state==='walking')player.state='walking';}else if(player.state==='walking')player.state='idle';
    ai.update(enemy,player,dt);player.update(dt,enemy);enemy.update(dt,player);
    const dist=Math.abs(player.x-enemy.x),md=player.w*0.55;
    if(dist<md){const p=(md-dist)/2,dir=player.x<enemy.x?-1:1;player.x+=dir*p;enemy.x-=dir*p;}
    checkHit(player,enemy);checkHit(enemy,player);
    screenShake*=0.88;if(screenShake<0.1)screenShake=0;
    particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;return p.life>0;});
    floatTexts=floatTexts.filter(f=>{f.y-=0.6;f.timer-=dt;return f.timer>0;});
    if(player.health<=0)endRound('enemy');else if(enemy.health<=0)endRound('player');
}
function draw() {
    const W=canvas.width,H=canvas.height;
    ctx.clearRect(0,0,W,H);ctx.save();
    if(screenShake>0.5)ctx.translate((Math.random()-0.5)*screenShake,(Math.random()-0.5)*screenShake);
    const sky=ctx.createLinearGradient(0,0,0,H*GROUND_RATIO);
    sky.addColorStop(0,'#0a0015');sky.addColorStop(0.3,'#150830');sky.addColorStop(0.6,'#1a0a30');sky.addColorStop(1,'#0d0520');
    ctx.fillStyle=sky;ctx.fillRect(0,0,W,H*GROUND_RATIO);
    ctx.fillStyle='rgba(255,255,255,0.5)';
    for(let i=0;i<50;i++){const sx=(i*139.7+i*i*7.1)%W,sy=(i*91.3+i*i*3.9)%(H*GROUND_RATIO*0.5);ctx.globalAlpha=0.2+Math.sin(Date.now()*0.0008+i)*0.3;ctx.fillRect(sx,sy,1.5,1.5);}
    ctx.globalAlpha=1;
    ctx.fillStyle='#ffe8d0';ctx.beginPath();ctx.arc(W*0.87,H*0.1,28,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0a0015';ctx.beginPath();ctx.arc(W*0.87+7,H*0.1-4,24,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0a0518';
    for(let i=0;i<W/28;i++){const bx=i*28,cbh=40+Math.sin(i*1.7)*25+Math.sin(i*0.4)*15;ctx.fillRect(bx,H*GROUND_RATIO-20-cbh,26,cbh+20);}
    ctx.fillStyle='rgba(255,200,100,0.3)';
    for(let i=0;i<W/28;i++){if(i%3===0)continue;const lx=i*28+4,ly=H*GROUND_RATIO-20-(40+Math.sin(i*1.7)*25+Math.sin(i*0.4)*15)+8;ctx.fillRect(lx,ly,2,2);ctx.fillRect(lx+13,ly+10,2,2);}
    const gg=ctx.createLinearGradient(0,H*GROUND_RATIO,0,H);
    gg.addColorStop(0,'#221133');gg.addColorStop(0.3,'#150820');gg.addColorStop(1,'#0a0410');
    ctx.fillStyle=gg;ctx.fillRect(0,H*GROUND_RATIO,W,H);
    ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
    for(let i=0;i<12;i++){ctx.beginPath();ctx.moveTo(i*(W/12),H*GROUND_RATIO);ctx.lineTo(i*(W/12)+12,H);ctx.stroke();}
    ctx.strokeStyle='rgba(255,68,68,0.12)';ctx.lineWidth=2;ctx.setLineDash([5,10]);
    ctx.beginPath();ctx.moveTo(18,H*GROUND_RATIO);ctx.lineTo(18,H);ctx.stroke();
    ctx.beginPath();ctx.moveTo(W-18,H*GROUND_RATIO);ctx.lineTo(W-18,H);ctx.stroke();ctx.setLineDash([]);

    [player,enemy].sort((a,b)=>a.z-b.z).forEach(f=>f.draw(ctx));

    particles.forEach(p=>{ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});
    ctx.globalAlpha=1;
    floatTexts.forEach(f=>{ctx.globalAlpha=f.timer/f.maxTimer;ctx.fillStyle=f.color;ctx.font='bold 22px Arial';ctx.textAlign='center';ctx.strokeStyle='#000';ctx.lineWidth=3;ctx.strokeText(f.text,f.x,f.y);ctx.fillText(f.text,f.x,f.y);});
    ctx.globalAlpha=1;ctx.restore();

    const barW=W*0.38,barH=20,barY=22,bx1=W*0.02,bx2=W*0.6;
    ctx.fillStyle='#222';ctx.fillRect(bx1,barY,barW,barH);
    const p1P=player.health/player.maxHealth;ctx.fillStyle=p1P>0.5?'#33cc44':p1P>0.25?'#cccc33':'#cc3333';
    ctx.fillRect(bx1+2,barY+2,(barW-4)*p1P,barH-4);
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;ctx.strokeRect(bx1,barY,barW,barH);
    ctx.fillStyle='#222';ctx.fillRect(bx2,barY,barW,barH);
    const p2P=enemy.health/enemy.maxHealth;ctx.fillStyle=p2P>0.5?'#33cc44':p2P>0.25?'#cccc33':'#cc3333';
    const ef=(barW-4)*p2P;ctx.fillRect(bx2+barW-2-ef,barY+2,ef,barH-4);ctx.strokeRect(bx2,barY,barW,barH);
    ctx.fillStyle='#fff';ctx.font='bold 11px Arial';ctx.textAlign='left';ctx.fillText(Math.ceil(player.health),bx1+6,barY+14);
    ctx.textAlign='right';ctx.fillText(Math.ceil(enemy.health),bx2+barW-6,barY+14);
    ctx.font='bold 13px Arial';ctx.textAlign='left';ctx.fillStyle=player.color;ctx.fillText(player.name,bx1,barY-6);
    ctx.textAlign='right';ctx.fillStyle=enemy.color;ctx.fillText(enemy.name,bx2+barW,barY-6);
    const sbW=barW*0.65,sbH=5,sbY=barY+barH+3;
    ctx.fillStyle='#222';ctx.fillRect(bx1,sbY,sbW,sbH);const p1s=player.superMeter/player.maxSuper;ctx.fillStyle=p1s>=1?'#ffcc00':'#4488ff';ctx.fillRect(bx1+1,sbY+1,(sbW-2)*p1s,sbH-2);
    ctx.fillStyle='#222';ctx.fillRect(bx2+barW-sbW,sbY,sbW,sbH);const p2s=enemy.superMeter/enemy.maxSuper;ctx.fillStyle=p2s>=1?'#ffcc00':'#4488ff';ctx.fillRect(bx2+barW-sbW+1,sbY+1,(sbW-2)*p2s,sbH-2);
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='7px Arial';ctx.textAlign='left';ctx.fillText('SUPER',bx1,sbY+4);ctx.textAlign='right';ctx.fillText('SUPER',bx2+barW,sbY+4);
    const cx=W/2;ctx.textAlign='center';
    ctx.font='bold 13px Arial';ctx.fillStyle='#888';
    let rt='';for(let i=0;i<Math.max(1,roundsToWin*2-1);i++){if(i<p1Rounds)rt+='● ';else if(i<p1Rounds+p2Rounds)rt+='○ ';else rt+='· ';}
    ctx.fillText(rt.trim(),cx,16);
    ctx.font='bold 28px Arial';ctx.fillStyle=timeLeft<10?'#ff4444':timeLeft<30?'#ffaa00':'#fff';
    ctx.fillText(Math.ceil(timeLeft),cx,barY+barH+26);
    ctx.font='11px Arial';ctx.fillStyle='#666';ctx.fillText('ROUND '+currentRound,cx,barY-12);
    if(enemy.hitCount>2){ctx.font='bold 26px Arial';ctx.fillStyle='#ff8800';ctx.strokeStyle='#000';ctx.lineWidth=3;ctx.strokeText(enemy.hitCount+' HIT COMBO!',cx,H*0.38);ctx.fillText(enemy.hitCount+' HIT COMBO!',cx,H*0.38);}
    if(announceText){ctx.font='bold 56px Arial';ctx.strokeStyle='#000';ctx.lineWidth=4;ctx.fillStyle=announceText==='FIGHT!'?'#ff4444':'#fff';ctx.strokeText(announceText,cx,H*0.35);ctx.fillText(announceText,cx,H*0.35);}
    if(!('ontouchstart'in window)&&frameCount<240){ctx.font='10px Arial';ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillText('WASD:Move  Space:Block  J:LP  K:HP  L:LK  ;:HK  U:SP  I:ULT',cx,H-16);}
}
function loop(ts) {
    const dt=Math.min(0.05,(ts-lastTime)/1000);lastTime=ts;
    if(gameState==='fight'||gameState==='ko'){update(dt);draw();}else{ctx.clearRect(0,0,canvas.width,canvas.height);}
    requestAnimationFrame(loop);
}

// Character select
function setupCharSelect() {
    const grid=document.getElementById('charGrid');grid.innerHTML='';
    CHARACTERS.forEach((c,i)=>{const card=document.createElement('div');
        card.className='char-card'+(i===playerChar?' selected':'');
        card.innerHTML='<div class="char-avatar">'+c.icon+'</div><div class="char-name">'+c.name+'</div><div class="char-desc">'+c.desc+'</div>';
        card.addEventListener('click',()=>{document.querySelectorAll('.char-card').forEach(c=>c.classList.remove('selected'));card.classList.add('selected');playerChar=i;enemyChar=(i+1)%CHARACTERS.length;if(enemyChar===playerChar)enemyChar=(playerChar+1)%CHARACTERS.length;});
        grid.appendChild(card);});
}
// UI
document.getElementById('startBtn').addEventListener('click',()=>{initAudio();document.getElementById('menuScreen').classList.add('hidden');document.getElementById('charSelectScreen').classList.add('show');setupCharSelect();});
document.getElementById('charConfirmBtn').addEventListener('click',()=>{document.getElementById('charSelectScreen').classList.remove('show');difficulty=document.getElementById('diffSelect').value;roundsToWin=parseInt(document.getElementById('roundsSelect').value);gameState='fight';initGame();announce();});
document.getElementById('rematchBtn').addEventListener('click',()=>{initAudio();document.getElementById('resultScreen').classList.remove('show');gameState='fight';p1Rounds=0;p2Rounds=0;currentRound=1;initGame();announce();});
document.getElementById('menuBtn').addEventListener('click',()=>{document.getElementById('resultScreen').classList.remove('show');document.getElementById('menuScreen').classList.remove('hidden');gameState='menu';});

initGame(); setupJoystick(); setupActionButtons();
requestAnimationFrame(loop);
console.log('🔥 LES FIGHT v5 - Font Awesome + Realistic Humans!');
</script>
